name: Invoke GitLab Mirror Provisioning

on:
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force-push branches to GitLab (tick only if a branch diverged on GitLab and the normal push is rejected)"
        type: boolean

jobs:
  mirror:
    uses: zimble-gh/.github/.github/workflows/provision-gitlab-mirror.yml@main
    secrets: inherit
    with:
      force_push: ${{ inputs.force_push }}
