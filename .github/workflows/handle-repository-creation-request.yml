name: Handle Repository Creation Request

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: >
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'repo-creation-request') &&
      startsWith(github.event.issue.title, '[REPO-CREATION-REQUEST]')
    runs-on: ubuntu-latest

    outputs:
      validate_status:   ${{ steps.validate.outputs.status }}
      duplicate_status:  ${{ steps.duplicate.outputs.status }}
      duplicate_message: ${{ steps.duplicate.outputs.message }}
      create_status:     ${{ steps.create.outputs.status }}
      topics_status:     ${{ steps.topics.outputs.status }}
      topics_message:    ${{ steps.topics.outputs.message }}
      metadata_status:   ${{ steps.metadata.outputs.status }}
      orgvars_status:    ${{ steps.orgvars.outputs.status }}

      message:   ${{ steps.create.outputs.message || steps.validate.outputs.message }}
      repo_url:  ${{ steps.create.outputs.repo_url }}
      warnings:  ${{ steps.validate.outputs.warnings }}

    steps:

      - uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id:      ${{ secrets.GH_APP_ID || vars.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}

      # =========================
      # VALIDATE
      # =========================
      - name: Validate Input
        id: validate
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.issue.body;

            function extract(label) {
              const regex  = new RegExp(`### ${label}\\s+([\\s\\S]*?)(?=\\n###|$)`);
              const match  = body.match(regex);
              return match ? match[1].trim() : null;
            }

            let errors = [];
            let warnings = [];

            // =========================
            // Extract
            // =========================
            const product        = extract("Product Line");
            const aspect         = extract("Aspect / Domain");
            const name           = extract("Repository Name");
            const projectType    = extract("Project Type");
            const descriptionRaw = extract("Repository Description \\(Max\\. 350 characters\\)");
            const visibilityRaw  = extract("Repository Visibility");
            const repoOptions    = extract("Repository Options \\(Optional\\)");
            let   tenant         = extract("Tenant Name \\(Optional\\)");

            // =========================
            // Normalize tenant
            // =========================
            if (!tenant || tenant === "_No response_" || tenant === "None") {
              tenant = null;
            }

            // =========================
            // Required field validation
            // =========================
            if (!product)        errors.push("Missing: Product Line");
            if (!aspect)         errors.push("Missing: Aspect / Domain");
            if (!name)           errors.push("Missing: Repository Name");
            if (!projectType)    errors.push("Missing: Project Type");
            if (!descriptionRaw) errors.push("Missing: Repository Description");

            // =========================
            // Name validation
            // =========================
            if (name && !/^[a-z0-9-]+$/.test(name)) {
              errors.push("Repository name must be kebab-case (lowercase, numbers, hyphens only).");
            }

            // =========================
            // Visibility
            // =========================
            let visibility;

            if (visibilityRaw?.includes("Private")) {
              visibility = "private";
            } else if (visibilityRaw?.includes("Public")) {
              visibility = "public";
            } else if (visibilityRaw?.includes("Internal")) {
              visibility = "internal";
            } else {
              errors.push("Invalid visibility option selected.");
            }

            // =========================
            // Auto Init
            // =========================
            let autoInit = false;

            if (repoOptions) {
              if (repoOptions.includes("- [x] Initialize repository with README")) {
                autoInit = true;
              } else if (repoOptions !== "_No response_") {
                errors.push("Invalid repository options selection.");
              }
            }

            // =========================
            // Compute final repo name
            // =========================
            let finalName = null;

            if (product && aspect && name) {
              finalName = tenant
                ? `${product}-${aspect}-${name}-${tenant}`
                : `${product}-${aspect}-${name}`;

              if (finalName.length > 100) {
                errors.push(
                  `❌ Repository name exceeds allowed length.

            Allowed max length: 100 characters  
            Computed final repository name:
            ${finalName}

            Computed length: ${finalName.length}

            👉 Naming format:
            <product>-<aspect>-<name>[-<tenant>]`
                );
              }
            }

            // =========================
            // Topics
            // =========================
            function sanitize(v) {
              return v.toLowerCase().replace(/[^a-z0-9-]/g, "-");
            }

            let topics = [];

            if (product && aspect && name && projectType) {
              topics = [
                "managed-by-platform",
                `product-${sanitize(product)}`,
                `aspect-${sanitize(aspect)}`,
                `repo-${sanitize(name)}`,
                `type-${sanitize(projectType)}`
              ];

              if (tenant) topics.push(`tenant-${sanitize(tenant)}`);

              const longTopics = topics.filter(t => t.length > 50);

              if (longTopics.length > 0) {
                errors.push(
                  `❌ Some repository topics exceed 50 characters:

            ${longTopics.join("\n")}

            👉 Please shorten input values.`
                );
              }
            }

            // =========================
            // Description warning
            // =========================
            if (descriptionRaw && descriptionRaw.length > 350) {
              warnings.push(
                "Description exceeds 350 characters and will be truncated."
              );
            }

            // =========================
            // Metadata JSON
            // =========================
            const metadata = {
              REPO_METADATA_PRODUCTLINE: product,
              REPO_METADATA_ASPECT: aspect,
              REPO_METADATA_NAME: name,
              REPO_METADATA_TYPE: projectType,
              REPO_METADATA_TENANT: tenant,
              REPO_METADATA_MANAGED: true
            };

            // =========================
            // FINAL DECISION
            // =========================
            if (errors.length > 0) {
              core.setOutput("status", "PARSE_ERROR");
              core.setOutput("message", errors.join("\n\n"));
              core.setOutput("warnings", JSON.stringify(warnings));
              return;
            }

            // =========================
            // SUCCESS OUTPUTS
            // =========================
            core.setOutput("status", "OK");
            core.setOutput("final_name", finalName);
            core.setOutput("visibility", visibility);
            core.setOutput("auto_init", autoInit);
            core.setOutput("topics", JSON.stringify(topics));
            core.setOutput("metadata", JSON.stringify(metadata));
            core.setOutput("description", descriptionRaw.substring(0, 350));
            core.setOutput("warnings", JSON.stringify(warnings));

      # =========================
      # DUPLICATE CHECK
      # =========================
      - name: Check Duplicate
        id: duplicate
        if: steps.validate.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              await github.rest.repos.get({
                owner: context.repo.owner,
                repo: process.env.FINAL_NAME
              });

              core.setOutput("status", "DUPLICATE_ERROR");

            } catch (e) {

              if (e.status === 404) {
                core.setOutput("status", "OK");
                return;
              }

              // 🔥 REAL ERROR PROPAGATION
              const msg = `❌ Failed to verify if repository already exists.

            Repository: ${process.env.FINAL_NAME}

            Error: ${e.message}

            👉 Please retry or contact platform team if issue persists.`;

              core.setOutput("status", "ERROR");
              core.setOutput("message", msg);
            }

      # =========================
      # CREATE REPO
      # =========================
      - name: Create Repo
        id: create
        if: steps.duplicate.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME:  ${{ steps.validate.outputs.final_name }}
          DESCRIPTION: ${{ steps.validate.outputs.description }}
          VISIBILITY:  ${{ steps.validate.outputs.visibility }}
          AUTO_INIT:   ${{ steps.validate.outputs.auto_init }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              const repo = await github.rest.repos.createInOrg({
                org: context.repo.owner,
                name: process.env.FINAL_NAME,
                description: process.env.DESCRIPTION,
                visibility: process.env.VISIBILITY,
                auto_init: process.env.AUTO_INIT === "true"
              });

              core.setOutput("status", "OK");
              core.setOutput("repo_url", repo.data.html_url);

            } catch (e) {
              core.setOutput("status", "ERROR");
              core.setOutput("message", e.message);
            }

      # =========================
      # TOPICS
      # =========================
      - name: Add Topics
        id: topics
        continue-on-error: true
        if: steps.create.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
          TOPICS:     ${{ steps.validate.outputs.topics }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              const topics = JSON.parse(process.env.TOPICS);

              await github.rest.repos.replaceAllTopics({
                owner: context.repo.owner,
                repo: process.env.FINAL_NAME,
                names: topics
              });

              core.setOutput("status", "OK");

            } catch (e) {

              const msg = `Failed to apply repository topics.

            Repository: ${process.env.FINAL_NAME}

            Topics:
            ${process.env.TOPICS}

            Error:
            ${e.message}`;

              core.setOutput("status", "ERROR");
              core.setOutput("message", msg);
            }

      # =========================
      # METADATA VARIABLES
      # =========================
      - name: Add Metadata Variables
        id: metadata
        continue-on-error: true
        if: steps.create.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
          METADATA:   ${{ steps.validate.outputs.metadata }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              const metadata = JSON.parse(process.env.METADATA);
              for (const [k, v] of Object.entries(metadata)) {
                if (v !== null) {
                  await github.rest.actions.createRepoVariable({
                    owner: context.repo.owner,
                    repo: process.env.FINAL_NAME,
                    name: k,
                    value: String(v)
                  });
                }
              }
              core.setOutput("status", "OK");
            } catch (e) {
              core.setOutput("status", "ERROR");
              core.setOutput("message", e.message);
            }

      # =========================
      # ORG VAR COPY
      # =========================
      - name: Copy Org Variables
        id: orgvars
        continue-on-error: true
        if: steps.create.outputs.status == 'OK' && steps.validate.outputs.visibility == 'private'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              const res = await github.rest.actions.listOrgVariables({
                org: context.repo.owner
              });

              for (const v of res.data.variables) {
                await github.rest.actions.createRepoVariable({
                  owner: context.repo.owner,
                  repo: process.env.FINAL_NAME,
                  name: v.name,
                  value: v.value
                });
              }

              core.setOutput("status", "OK");

            } catch (e) {
              core.setOutput("status", "ERROR");
              core.setOutput("message", e.message);
            }

  # =========================
  # FINALIZE
  # =========================
  finalize:
    needs: process
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Comment & Close
        uses: actions/github-script@v9
        env:
          VALIDATE_STATUS:   ${{ needs.process.outputs.validate_status }}
          DUPLICATE_STATUS:  ${{ needs.process.outputs.duplicate_status }}
          DUPLICATE_MESSAGE: ${{ needs.process.outputs.duplicate_message }}
          CREATE_STATUS:     ${{ needs.process.outputs.create_status }}
          TOPICS_STATUS:     ${{ needs.process.outputs.topics_status }}
          TOPICS_MESSAGE:    ${{ needs.process.outputs.topics_message }}
          METADATA_STATUS:   ${{ needs.process.outputs.metadata_status }}
          ORGVARS_STATUS:    ${{ needs.process.outputs.orgvars_status }}
          MESSAGE:           ${{ needs.process.outputs.message }}
          URL:               ${{ needs.process.outputs.repo_url }}
          WARNINGS:          ${{ needs.process.outputs.warnings }}
        with:
          script: |
            const s = process.env;
            const warnings = JSON.parse(s.WARNINGS || "[]");

            let body = "";

            if (s.VALIDATE_STATUS === "PARSE_ERROR") {
              body = `❌ ${s.MESSAGE}`;
            } else if (s.DUPLICATE_STATUS === "DUPLICATE_ERROR") {
              body = `❌ Repository already exists.\n\nPlease edit and retry.`;
            } else if (s.DUPLICATE_STATUS === "ERROR") {
              body = s.DUPLICATE_MESSAGE || "❌ Duplicate check failed.";
            } else if (s.CREATE_STATUS === "ERROR") {
              body = `❌ Repo creation failed: ${s.MESSAGE}`;
            } else if (s.CREATE_STATUS === "OK") {

              if (s.TOPICS_STATUS === "ERROR") {
                warnings.push(`⚠️ Topics step failed:\n${s.TOPICS_MESSAGE}`);
              }

              if (s.METADATA_STATUS === "ERROR")
                warnings.push("Failed to set metadata variables");

              if (s.ORGVARS_STATUS === "ERROR")
                warnings.push("Failed to copy org variables");

              if (warnings.length === 0) {
                body = `✅ Repository created successfully\n\n🔗 ${s.URL}`;
              } else {
                body = `⚠️ Repository created with warnings:\n\n${warnings.join("\n")}\n\n🔗 ${s.URL}`;
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (
              s.CREATE_STATUS === "OK" ||
              s.DUPLICATE_STATUS === "DUPLICATE_ERROR"
            ) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: "closed"
              });
            }
