      - name: Sync Secrets to Repository
        id: sync_repository_secrets
        continue-on-error: true
        if: steps.create_repository.outputs.status == 'OK' && steps.validate_request.outputs.visibility == 'private'
        uses: actions/github-script@v9
        env:
          GH_TOKEN:           ${{ steps.generate_app_token.outputs.token }}
          REPO:               ${{ steps.validate_request.outputs.final_name }}
          ORG:                ${{ github.repository_owner }}
          GITLAB_API_TOKEN:   ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}
        with:
          github-token: ${{ steps.generate_app_token.outputs.token }}
          script: |
            try {
              const { execSync } = require("child_process");

              const repo = `${process.env.ORG}/${process.env.REPO}`;

              execSync(`echo "${process.env.GITLAB_API_TOKEN}" | gh secret set GITLAB_API_TOKEN --repo ${repo}`);
              execSync(`echo "${process.env.GH_APP_PRIVATE_KEY}" | gh secret set GH_APP_PRIVATE_KEY --repo ${repo}`);

              core.setOutput("status", "OK");
              core.setOutput("success", "✅ Secrets synced successfully.");

            } catch (e) {
              core.setOutput("status", "ERROR");
              core.setOutput("error", `⚠️ Failed to sync secrets.\n\nError: ${e.message}`);
            }
            
  update_issue_status:
    name: Update Issue Status
    needs: provision_repository
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Comment on Issue and Update Status
        uses: actions/github-script@v9
        env:
          DATA: ${{ toJson(needs.provision_repository.outputs) }}
        with:
          script: |
            const d = JSON.parse(process.env.DATA);

            let success = [];
            let warnings = [];
            let info = [];
            let errors = [];

            function safeParse(val) {
              try {
                return JSON.parse(val || "[]");
              } catch {
                return [];
              }
            }

            if (d.validate_status === "PARSE_ERROR") {
              errors.push(d.validate_error);
            } else {
              if (d.validate_success) success.push(d.validate_success);
              warnings.push(...safeParse(d.validate_warning));
            }

            if (d.duplicate_status === "DUPLICATE_ERROR"
             || d.duplicate_status === "ERROR") errors.push(d.duplicate_error);
            else if (d.duplicate_status === "OK") success.push(d.duplicate_success);  

            if (d.create_status === "ERROR") errors.push(d.create_error);
            else if (d.create_status === "OK") success.push(d.create_success);

            if (d.topics_status === "ERROR") warnings.push(d.topics_error);
            else if (d.topics_status === "OK") success.push(d.topics_success);            

            if (d.metadata_status === "ERROR") warnings.push(d.metadata_error);
            else if (d.metadata_status === "OK") success.push(d.metadata_success);            

            if (d.org_vars_status === "ERROR") warnings.push(d.org_vars_error);
            else if (d.org_vars_status === "OK") success.push(d.org_vars_success);            

            if (d.secrets_status === "ERROR") warnings.push(d.secrets_error)
            else if (d.secrets_status === "OK") success.push(d.secrets_success);            

            if (d.org_vars_info) info.push(d.org_vars_info);

            let body = "";

            if (success.length > 0) {
              body += `✅ Success:\n---------\n\n${success.join("\n\n")}`;
            }

            if (errors.length > 0) {
              body += `\n\n❌ Errors:\n---------\n\n${errors.join("\n\n")}`;
            }

            if (warnings.length > 0) {
              body += `\n\n⚠️ Warnings:\n---------\n\n${warnings.join("\n\n")}`;
            }

            if (info.length > 0) {
              body += `\n\nℹ️ Info:\n---------\n\n${info.join("\n\n")}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (d.create_status === "OK" || d.duplicate_status === "DUPLICATE_ERROR") {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: "closed"
              });
            }
