name: Handle Repository Creation Request

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: >
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'repo-creation-request') &&
      startsWith(github.event.issue.title, '[REPO-CREATION-REQUEST]')
    runs-on: ubuntu-latest
    outputs:
      status:   ${{ steps.logic.outputs.status }}
      message:  ${{ steps.logic.outputs.message }}
      repo_url: ${{ steps.logic.outputs.repo_url }}

    steps:
      # 🔐 Generate GitHub App Token
      - uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id:      ${{ secrets.GH_APP_ID || vars.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}

      # 🧠 All Logic In One Deterministic Step
      - name: Process Request
        id: logic
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const body = context.payload.issue.body;

            console.log("----- Repository Provisioning Started -----");
            console.log("Issue : ", context.issue.number);

            function extract(label) {
              const regex  = new RegExp(`### ${label}\\s+([\\s\\S]*?)(?=\\n###|$)`);
              const match  = body.match(regex);
              return match ? match[1].trim() : null;
            }

            try {
              const product     = extract("Product Line");
              const aspect      = extract("Aspect / Domain");
              const name        = extract("Repository Name");
              const projectType = extract("Project Type");
              let   tenant      = extract("Tenant Name \\(Optional\\)");

              if (projectType.startsWith("---")) {
                core.setOutput("status", "PARSE_ERROR");
                core.setOutput("message", "Please select a valid project type (not a category header).");
                return;
              }

              if (!tenant || tenant === "_No response_" || tenant === "None") {
                tenant = null;
              }

              const description   = extract("Repository Description \\(Max\\. 350 characters\\)");
              const visibilityRaw = extract("Repository Visibility");

              let visibility;

              if (visibilityRaw.includes("Private")) {
                visibility = "private";
              } else if (visibilityRaw.includes("Public")) {
                visibility = "public";
              } else if (visibilityRaw.includes("Internal")) {
                visibility = "internal";
              } else {
                core.setOutput("status", "PARSE_ERROR");
                core.setOutput("message", "Invalid visibility option selected.");
                return;
              }

              console.log("Selected visibility: ", visibility);

              if (!product || !aspect || !projectType || !name || !description || !visibilityRaw) {
                core.setOutput("status", "PARSE_ERROR");
                core.setOutput("message", "Missing required fields.");
                return;
              }

              if (!/^[a-z0-9-]+$/.test(name)) {
                core.setOutput("status", "PARSE_ERROR");
                core.setOutput("message", "Repository name must be kebab-case.");
                return;
              }

              const finalName = tenant
                ? `${product}-${aspect}-${name}-${tenant}`
                : `${product}-${aspect}-${name}`;

              if (finalName.length > 100) { // repository name cannot be more than 100 characters
                core.setOutput("status", "PARSE_ERROR");
                core.setOutput("message", `Evaluated repository name is :\n${finalName}\n\nRepository name cannot be more than 100 characters.`);
                return;
              }

              // 🔹 Topic Sanitizer
              function sanitizeTopic(value) {
                return value
                  .toLowerCase()
                  .replace(/[^a-z0-9-]/g, "-")
                  .replace(/-+/g, "-")
                  .replace(/^-|-$/g, "");
              }

              // 🔹 Build Topics
              const topics = [
                `product-${sanitizeTopic(product)}`,
                `aspect-${sanitizeTopic(aspect)}`,
                `repo-${sanitizeTopic(name)}`,
                `type-${sanitizeTopic(projectType)}`,
                "managed-by-platform"
              ];

              if (tenant) {
                topics.push(`tenant-${sanitizeTopic(tenant)}`);
              }
              
              const extraLengthyTopics = topics.filter((topic) => topic.length > 50); // repository topic cannot be more than 50 characters
              if (extraLengthyTopics.length > 0) {
                core.setOutput("status", "PARSE_ERROR");
                core.setOutput("message", `Evaluated repository topics are :\n${extraLengthyTopics}\n\nAny topic attached to the repository cannot be more than 50 characters.`);
                return;
              }

              console.log("Checking duplicate for: ", finalName);

              try {
                const repo = await github.rest.repos.get({
                  owner : context.repo.owner,
                  repo  : finalName
                });

                core.setOutput("status", "DUPLICATE");
                core.setOutput("repo_url", repo.data.html_url);
                core.setOutput("message", "Repository already exists.");
                return;

              } catch (duplicateCheckError) {

                if (duplicateCheckError.status === 404) {
                  console.log("No duplicate found.");
                } else {
                  console.error("Duplicate check failed:", duplicateCheckError.message);

                  core.setOutput("status", "ERROR");
                  core.setOutput("message", `Duplicate verification failed : ${duplicateCheckError.message}`);
                  return;
                }
              }

              const repositoryOptionsRaw = extract("Repository Options \\(Optional\\)");

              let autoInit = false;

              if (
                repositoryOptionsRaw &&
                repositoryOptionsRaw.includes("- [x] Initialize repository with README")
              ) {
                autoInit = true;
              }

              console.log("Auto init:", autoInit);

              console.log("Creating repository:", finalName);

              const repo = await github.rest.repos.createInOrg({
                org         : context.repo.owner,
                name        : finalName,
                description : description.substring(0, 350), // description cannot be more than 350 characters
                visibility,
                auto_init   : autoInit
              });

              console.log("Repository created:", repo.data.html_url);

              console.log("Applying prefixed topics:", topics);

              // 🔹 Apply Topics
              await github.rest.repos.replaceAllTopics({
                owner : context.repo.owner,
                repo  : finalName,
                names : topics
              });

              console.log("Repository topics applied successfully");

              console.log("Setting repository variables...");

              async function createVariable(name, value) {
                if (value === null || value === undefined) return;

                await github.rest.actions.createRepoVariable({
                  owner: context.repo.owner,
                  repo: finalName,
                  name,
                  value: String(value)
                });
              }

              try {
                await createVariable("PROJECT_METADATA_PRODUCT", product);
                await createVariable("PROJECT_METADATA_ASPECT", aspect);
                await createVariable("PROJECT_METADATA_NAME", name);
                await createVariable("PROJECT_METADATA_TYPE", projectType);

                if (tenant) {
                  await createVariable("PROJECT_METADATA_TENANT", tenant);
                }

                await createVariable("PROJECT_METADATA_MANAGED", "true");

                console.log("Repository variables set successfully");

                core.setOutput("status", "SUCCESS");
                core.setOutput("repo_url", repo.data.html_url);
                core.setOutput("message", "Repository created successfully with topics applied and metadata variables.");

              } catch (err) {
                console.error("Failed to set repo variables:", err.message);
                throw err;
              }              

            } catch (unhandledError) {
              console.error("Unhandled error:", unhandledError.message);

              core.setOutput("status", "ERROR");
              core.setOutput("message", unhandledError.message);
            }

  finalize:
    needs: process
    runs-on: ubuntu-latest

    steps:
      - name: Comment & Close if needed
        uses: actions/github-script@v9
        env:
          STATUS:  ${{ needs.process.outputs.status }}
          MESSAGE: ${{ needs.process.outputs.message }}
          URL:     ${{ needs.process.outputs.repo_url }}
        with:
          script: |
            const status  = process.env.STATUS;
            const message = process.env.MESSAGE;
            const url     = process.env.URL;

            console.log("DEBUG status  : ", status);
            console.log("DEBUG message : ", message);
            console.log("DEBUG url     : ", url);

            let body = "";

            switch(status) {
              case "SUCCESS":
                body = `✅ ${message}\n\n🔗 ${url}`;
                break;
              case "DUPLICATE":
                body = `❌ ${message}\n\n🔗 ${url}\n\nPlease reopen the issue, edit and correct it or open a fresh issue with corrected values.`;
                break;
              case "PARSE_ERROR":
                body = `❌ ${message}\n\nPlease edit the issue and correct it.`;
                break;
              default:
                body = `❌ Unexpected error: ${message}`;
            }

            await github.rest.issues.createComment({
              owner        : context.repo.owner,
              repo         : context.repo.repo,
              issue_number : context.issue.number,
              body
            });

            if (status === "SUCCESS" || status === "DUPLICATE") {
              await github.rest.issues.update({
                owner        : context.repo.owner,
                repo         : context.repo.repo,
                issue_number : context.issue.number,
                state        : "closed"
              });
            }
