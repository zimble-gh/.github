name: Handle Repository Creation Request

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: >
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'repo-creation-request') &&
      startsWith(github.event.issue.title, '[REPO-CREATION-REQUEST]')
    runs-on: ubuntu-latest

    outputs:
      validate_status:  ${{ steps.validate.outputs.status }}
      validate_success: ${{ steps.validate.outputs.success }}
      validate_error:   ${{ steps.validate.outputs.error }}
      validate_warning: ${{ steps.validate.outputs.warning }}
      validate_info:    ${{ steps.validate.outputs.info }}

      duplicate_status: ${{ steps.duplicate.outputs.status }}
      duplicate_error:  ${{ steps.duplicate.outputs.error }}

      create_status:   ${{ steps.create.outputs.status }}
      create_success:  ${{ steps.create.outputs.success }}
      create_error:    ${{ steps.create.outputs.error }}

      topics_status:   ${{ steps.topics.outputs.status }}
      topics_success:  ${{ steps.topics.outputs.success }}
      topics_error:    ${{ steps.topics.outputs.error }}

      metadata_status:  ${{ steps.metadata.outputs.status }}
      metadata_success: ${{ steps.metadata.outputs.success }}
      metadata_error:   ${{ steps.metadata.outputs.error }}

      orgvars_status:  ${{ steps.orgvars.outputs.status }}
      orgvars_success: ${{ steps.orgvars.outputs.success }}
      orgvars_error:   ${{ steps.orgvars.outputs.error }}
      orgvars_info:    ${{ steps.orgvars.outputs.info }}

    steps:

      - uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id:      ${{ secrets.GH_APP_ID || vars.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}

      # =========================
      # VALIDATE
      # =========================
      - name: Validate Input
        id: validate
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.issue.body;

            function extract(label) {
              const regex  = new RegExp(`### ${label}\\s+([\\s\\S]*?)(?=\\n###|$)`);
              const match  = body.match(regex);
              return match ? match[1].trim() : null;
            }

            let errors = [];
            let warnings = [];

            const product        = extract("Product Line");
            const aspect         = extract("Aspect / Domain");
            const name           = extract("Repository Name");
            const projectType    = extract("Project Type");
            const descriptionRaw = extract("Repository Description \\(Max\\. 350 characters\\)");
            const visibilityRaw  = extract("Repository Visibility");
            const repoOptions    = extract("Repository Options \\(Optional\\)");
            let tenant           = extract("Tenant Name \\(Optional\\)");

            if (!tenant || tenant === "_No response_" || tenant === "None") {
              tenant = null;
            }

            if (!product) errors.push("Missing: Product Line");
            if (!aspect) errors.push("Missing: Aspect / Domain");
            if (!name) errors.push("Missing: Repository Name");
            if (!projectType) errors.push("Missing: Project Type");
            if (!descriptionRaw) errors.push("Missing: Repository Description");

            if (name && !/^[a-z0-9-]+$/.test(name)) {
              errors.push("Repository name must be kebab-case.");
            }

            let visibility;

            if (visibilityRaw?.includes("Private")) visibility = "private";
            else if (visibilityRaw?.includes("Public")) visibility = "public";
            else if (visibilityRaw?.includes("Internal")) visibility = "internal";
            else errors.push("Invalid visibility option.");

            let autoInit = false;

            if (repoOptions) {
              if (repoOptions.includes("- [x] Initialize repository with README")) {
                autoInit = true;
              } else if (repoOptions !== "_No response_") {
                errors.push("Invalid repository option.");
              }
            }

            let finalName = null;

            if (product && aspect && name) {
              finalName = tenant
                ? `${product}-${aspect}-${name}-${tenant}`
                : `${product}-${aspect}-${name}`;

              if (finalName.length > 100) {
                errors.push(`Repo name too long (${finalName.length}/100):\n${finalName}`);
              }
            }

            function sanitize(v) {
              return v.toLowerCase().replace(/[^a-z0-9-]/g, "-");
            }

            let topics = [];

            if (product && aspect && name && projectType) {
              topics = [
                "managed-by-platform",
                `product-${sanitize(product)}`,
                `aspect-${sanitize(aspect)}`,
                `repo-${sanitize(name)}`,
                `type-${sanitize(projectType)}`
              ];

              if (tenant) topics.push(`tenant-${sanitize(tenant)}`);

              const longTopics = topics.filter(t => t.length > 50);
              if (longTopics.length > 0) {
                errors.push(`Topics exceed 50 chars:\n${longTopics.join("\n")}`);
              }
            }

            if (descriptionRaw && descriptionRaw.length > 350) {
              warnings.push("Description will be truncated.");
            }

            const metadata = {
              REPO_METADATA_PRODUCTLINE: product,
              REPO_METADATA_ASPECT: aspect,
              REPO_METADATA_NAME: name,
              REPO_METADATA_TYPE: projectType,
              REPO_METADATA_TENANT: tenant,
              REPO_METADATA_MANAGED: true
            };

            if (errors.length > 0) {
              core.setOutput("status", "PARSE_ERROR");
              core.setOutput("error", errors.join("\n\n"));
              core.setOutput("warning", JSON.stringify(warnings));
              core.setOutput("info", JSON.stringify([]));
              return;
            }

            core.setOutput("status", "OK");
            core.setOutput("success", "✅ Validation successful.");
            core.setOutput("warning", JSON.stringify(warnings));
            core.setOutput("info", JSON.stringify([]));

            core.setOutput("final_name", finalName);
            core.setOutput("visibility", visibility);
            core.setOutput("auto_init", autoInit);
            core.setOutput("topics", JSON.stringify(topics));
            core.setOutput("metadata", JSON.stringify(metadata));
            core.setOutput("description", descriptionRaw.substring(0, 350));

      # =========================
      # DUPLICATE
      # =========================
      - name: Check Duplicate
        id: duplicate
        if: steps.validate.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              await github.rest.repos.get({
                owner: context.repo.owner,
                repo: process.env.FINAL_NAME
              });

              core.setOutput("status", "DUPLICATE_ERROR");

            } catch (e) {
              if (e.status === 404) {
                core.setOutput("status", "OK");
              } else {
                core.setOutput("status", "ERROR");
                core.setOutput("error", e.message);
              }
            }

      # =========================
      # CREATE
      # =========================
      - name: Create Repo
        id: create
        if: steps.duplicate.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME:  ${{ steps.validate.outputs.final_name }}
          DESCRIPTION: ${{ steps.validate.outputs.description }}
          VISIBILITY:  ${{ steps.validate.outputs.visibility }}
          AUTO_INIT:   ${{ steps.validate.outputs.auto_init }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              const repo = await github.rest.repos.createInOrg({
                org: context.repo.owner,
                name: process.env.FINAL_NAME,
                description: process.env.DESCRIPTION,
                visibility: process.env.VISIBILITY,
                auto_init: process.env.AUTO_INIT === "true"
              });

              core.setOutput("status", "OK");
              core.setOutput("success", `✅ Repo created:\n${repo.data.html_url}`);

            } catch (e) {
              core.setOutput("status", "ERROR");
              core.setOutput("error", e.message);
            }

      # =========================
      # TOPICS
      # =========================
      - name: Add Topics
        id: topics
        continue-on-error: true
        if: steps.create.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
          TOPICS:     ${{ steps.validate.outputs.topics }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              await github.rest.repos.replaceAllTopics({
                owner: context.repo.owner,
                repo: process.env.FINAL_NAME,
                names: JSON.parse(process.env.TOPICS)
              });

              core.setOutput("status", "OK");
              core.setOutput("success", "Topics applied.");

            } catch (e) {
              core.setOutput("status", "ERROR");
              core.setOutput("error", e.message);
            }

      # =========================
      # METADATA
      # =========================
      - name: Add Metadata Variables
        id: metadata
        continue-on-error: true
        if: steps.create.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
          METADATA:   ${{ steps.validate.outputs.metadata }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const metadata = JSON.parse(process.env.METADATA);
            let failures = [];

            for (const [k, v] of Object.entries(metadata)) {
              if (v == null) continue;
              try {
                await github.rest.actions.createRepoVariable({
                  owner: context.repo.owner,
                  repo: process.env.FINAL_NAME,
                  name: k,
                  value: String(v)
                });
              } catch (e) {
                failures.push(`${k}: ${e.message}`);
              }
            }

            if (failures.length === 0) {
              core.setOutput("status", "OK");
              core.setOutput("success", "Metadata variables set.");
            } else {
              core.setOutput("status", "ERROR");
              core.setOutput("error", failures.join("\n"));
            }

      # =========================
      # ORG VARS
      # =========================
      - name: Copy Org Variables
        id: orgvars
        continue-on-error: true
        if: steps.create.outputs.status == 'OK' && steps.validate.outputs.visibility == 'private'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate.outputs.final_name }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            let failures = [];
            let skipped = [];

            const vars = await github.paginate(
              github.rest.actions.listOrgVariables,
              { org: context.repo.owner }
            );

            for (const v of vars) {
              if (v.visibility === "selected") {
                skipped.push(v.name);
                continue;
              }

              try {
                await github.rest.actions.createRepoVariable({
                  owner: context.repo.owner,
                  repo: process.env.FINAL_NAME,
                  name: v.name,
                  value: v.value
                });
              } catch (e) {
                failures.push(`${v.name}: ${e.message}`);
              }
            }

            core.setOutput("info", JSON.stringify(skipped));

            if (failures.length === 0) {
              core.setOutput("status", "OK");
              core.setOutput("success", "Org variables copied.");
            } else {
              core.setOutput("status", "ERROR");
              core.setOutput("error", failures.join("\n"));
            }

  # =========================
  # FINALIZE
  # =========================
  finalize:
    needs: process
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Comment & Close
        uses: actions/github-script@v9
        env:
          DATA: ${{ toJson(needs.process.outputs) }}
        with:
          script: |
            const d = JSON.parse(process.env.DATA);

            let sections = [];

            function add(title, msg) {
              if (msg) sections.push(`### ${title}\n${msg}`);
            }

            if (d.validate_error) add("❌ Validation", d.validate_error);
            if (d.duplicate_error) add("❌ Duplicate Check", d.duplicate_error);
            if (d.create_error) add("❌ Creation", d.create_error);

            if (d.create_success) add("✅ Creation", d.create_success);
            if (d.topics_error) add("⚠️ Topics", d.topics_error);
            if (d.metadata_error) add("⚠️ Metadata", d.metadata_error);
            if (d.orgvars_error) add("⚠️ Org Vars", d.orgvars_error);

            if (d.orgvars_info) {
              const skipped = JSON.parse(d.orgvars_info || "[]");
              if (skipped.length > 0) {
                add("ℹ️ Skipped Org Vars", skipped.join("\n"));
              }
            }

            const body = sections.join("\n\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (d.create_status === "OK" || d.duplicate_status === "DUPLICATE_ERROR") {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: "closed"
              });
            }
