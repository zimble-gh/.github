name: Handle Repository Creation Request

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  provision_repository:
    name: Provision Repository
    if: >
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'repo-creation-request') &&
      startsWith(github.event.issue.title, '[REPO-CREATION-REQUEST]')
    runs-on: ubuntu-latest

    outputs:
      validate_status:  ${{ steps.validate_request.outputs.status }}
      validate_success: ${{ steps.validate_request.outputs.success }}
      validate_error:   ${{ steps.validate_request.outputs.error }}
      validate_warning: ${{ steps.validate_request.outputs.warning }}
      validate_info:    ${{ steps.validate_request.outputs.info }}

      duplicate_status:  ${{ steps.check_repository_existence.outputs.status }}
      duplicate_success: ${{ steps.check_repository_existence.outputs.success }}
      duplicate_error:   ${{ steps.check_repository_existence.outputs.error }}

      create_status:   ${{ steps.create_repository.outputs.status }}
      create_success:  ${{ steps.create_repository.outputs.success }}
      create_error:    ${{ steps.create_repository.outputs.error }}

      topics_status:   ${{ steps.apply_repository_topics.outputs.status }}
      topics_success:  ${{ steps.apply_repository_topics.outputs.success }}
      topics_error:    ${{ steps.apply_repository_topics.outputs.error }}

      metadata_status:  ${{ steps.set_repository_metadata.outputs.status }}
      metadata_success: ${{ steps.set_repository_metadata.outputs.success }}
      metadata_error:   ${{ steps.set_repository_metadata.outputs.error }}

      org_vars_status:  ${{ steps.copy_organization_variables.outputs.status }}
      org_vars_success: ${{ steps.copy_organization_variables.outputs.success }}
      org_vars_error:   ${{ steps.copy_organization_variables.outputs.error }}
      org_vars_info:    ${{ steps.copy_organization_variables.outputs.info }}

      secrets_status:  ${{ steps.sync_repository_secrets.outputs.status }}
      secrets_success: ${{ steps.sync_repository_secrets.outputs.success }}
      secrets_error:   ${{ steps.sync_repository_secrets.outputs.error }}
      
    steps:

# TODO: try actions/create-github-app-token@v3 in place of tibdex/github-app-token@v2
#? tibdex/github-app-token@v2 is archived and perhaps lacks maintenance
#? tibdex/github-app-token@v2 is running on Node.js 20 for which github runner support will be removed on September 16th, 2026.
#? tibdex/github-app-token@v2 action will be forced to run with Node.js 24 by default starting June 2nd, 2026.
#? tibdex/github-app-token@v2 may encounter unknown issues with Node.js 24. Need to test this.
#? actions/create-github-app-token@v3 requires app client-id but the token obtained expires too soon.
#? actions/create-github-app-token@v3 has app-id parameter also that parameter may provide longer living tokens. Need to dive more and explore.
#? app-id parameter with actions/create-github-app-token@v3 is deprecated. So need to find way to increase the token validity.
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@v3
        id: generate_app_token
        with:
          app-id:      ${{ secrets.GH_APP_ID || vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}

      - name: Validate Issue Input
        id: validate_request
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.issue.body;

            function extract(label) {
              const regex  = new RegExp(`### ${label}\\s+([\\s\\S]*?)(?=\\n###|$)`);
              const match  = body.match(regex);
              return match ? match[1].trim() : null;
            }

            function isChecked(block, label) {
              return block?.includes(`- [x] ${label}`);
            }

            let errors = [];
            let warnings = [];

            const product        = extract("Product Line");
            const aspect         = extract("Aspect / Domain");
            const name           = extract("Repository Name");
            const projectType    = extract("Project Type");
            const descriptionRaw = extract("Repository Description \\(Max\\. 350 characters\\)");
            const visibilityRaw  = extract("Repository Visibility");
            const repoOptions    = extract("Repository Options \\(Optional\\)");
            let tenant           = extract("Tenant Name \\(Optional\\)");

            if (projectType && projectType.startsWith("---")) {
              errors.push("❌ Invalid Project Type selected. Please choose a valid option.");
            }

            if (!tenant || tenant === "_No response_" || tenant === "None") {
              tenant = null;
            }

            if (!product) errors.push("❌ Missing: Product Line");
            if (!aspect) errors.push("❌ Missing: Aspect / Domain");
            if (!name) errors.push("❌ Missing: Repository Name");
            if (!projectType) errors.push("❌ Missing: Project Type");
            if (!descriptionRaw) errors.push("❌ Missing: Repository Description");

            if (name && !/^[a-z0-9-]+$/.test(name)) {
              errors.push("❌ Repository name must be kebab-case (lowercase, numbers, hyphens only).");
            }

            let visibility;
            if (visibilityRaw?.includes("Private")) visibility = "private";
            else if (visibilityRaw?.includes("Public")) visibility = "public";
            else if (visibilityRaw?.includes("Internal")) visibility = "internal";
            else errors.push("❌ Invalid visibility option selected.");

            let autoInit = false;
            if (repoOptions) {
              autoInit = isChecked(repoOptions, "Initialize repository with README");
            }

            let finalName = null;

            if (product && aspect && name) {
              finalName = tenant
                ? `${product}-${aspect}-${name}-${tenant}`
                : `${product}-${aspect}-${name}`;

              if (finalName.length > 100) {
                errors.push(
            `❌ Repository name exceeds allowed length.

            Allowed max length: 100 characters  
            Computed final repository name:
            ${finalName}

            Computed length: ${finalName.length}

            👉 Naming format:
            <product>-<aspect>-<name>[-<tenant>]`
                );
              }
            }

            function sanitize(v) {
              return v.toLowerCase().replace(/[^a-z0-9-]/g, "-");
            }

            let topics = [];

            if (product && aspect && name && projectType) {
              topics = [
                "managed-by-platform",
                `product-${sanitize(product)}`,
                `aspect-${sanitize(aspect)}`,
                `repo-${sanitize(name)}`,
                `type-${sanitize(projectType)}`
              ];

              if (tenant) topics.push(`tenant-${sanitize(tenant)}`);

              const longTopics = topics.filter(t => t.length > 50);

              if (longTopics.length > 0) {
                errors.push(
            `❌ Some repository topics exceed 50 characters:

            ${longTopics.join("\n")}

            👉 Please shorten input values.`
                );
              }
            }

            if (descriptionRaw && descriptionRaw.length > 350) {
              warnings.push("⚠️ Description exceeds 350 characters and will be truncated.");
            }

            const metadata = {
              REPO_METADATA_PRODUCTLINE: product,
              REPO_METADATA_ASPECT: aspect,
              REPO_METADATA_NAME: name,
              REPO_METADATA_TYPE: projectType,
              REPO_METADATA_TENANT: tenant,
              REPO_METADATA_MANAGED: true
            };

            if (errors.length > 0) {
              errors.push("ℹ️ To create a new repo please edit this issue and add correct inputs and try again\nOr\nclose this and open a new issue with correct inputs.")
              core.setOutput("status", "PARSE_ERROR");
              core.setOutput("error", errors.join("\n\n"));
              core.setOutput("warning", JSON.stringify(warnings));
              core.setOutput("info", JSON.stringify([]));
              return;
            }

            core.setOutput("status", "OK");
            core.setOutput("success", "✅ Validation successful.");
            core.setOutput("warning", JSON.stringify(warnings));
            core.setOutput("info", JSON.stringify([]));

            core.setOutput("final_name", finalName);
            core.setOutput("visibility", visibility);
            core.setOutput("auto_init", autoInit);
            core.setOutput("topics", JSON.stringify(topics));
            core.setOutput("metadata", JSON.stringify(metadata));
            core.setOutput("description", descriptionRaw.substring(0, 350));

      - name: Check Repository Existence
        id: check_repository_existence
        if: steps.validate_request.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate_request.outputs.final_name }}
        with:
          github-token: ${{ steps.generate_app_token.outputs.token }}
          script: |
            try {
              const repo = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: process.env.FINAL_NAME
              });

              const msg = `❌ Repository already exists.
            You can visit the existing repo for more clarity.
            🔗 ${repo.data.html_url}
            ℹ️ To create a new repo please reopen and edit this issue and try again or create a new issue with appropriate inputs.
            `;
              core.setOutput("status", "DUPLICATE_ERROR");
              core.setOutput("error", msg);
            } catch (e) {
              if (e.status === 404) {
                core.setOutput("status", "OK");
                core.setOutput("success", "✅ No duplicate repository.")
              } else {
                const msg = `❌ Failed to verify if repository already exists.

            Repository: ${process.env.FINAL_NAME}

            Error: ${e.message}

            👉 Please edit this issue and retry or close this and create a new issue or contact platform team if issue persists.
            `;
                core.setOutput("status", "ERROR");
                core.setOutput("error", msg);
              }
            }

      - name: Create Repository
        id: create_repository
        if: steps.check_repository_existence.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME:  ${{ steps.validate_request.outputs.final_name }}
          DESCRIPTION: ${{ steps.validate_request.outputs.description }}
          VISIBILITY:  ${{ steps.validate_request.outputs.visibility }}
          AUTO_INIT:   ${{ steps.validate_request.outputs.auto_init }}
        with:
          github-token: ${{ steps.generate_app_token.outputs.token }}
          script: |
            try {
              const repo = await github.rest.repos.createInOrg({
                org: context.repo.owner,
                name: process.env.FINAL_NAME,
                description: process.env.DESCRIPTION,
                visibility: process.env.VISIBILITY,
                auto_init: process.env.AUTO_INIT === "true"
              });

              core.setOutput("status", "OK");
              core.setOutput("success", `✅ Repository created successfully.\n\n🔗 ${repo.data.html_url}`);

            } catch (e) {
              const msg = `❌ Failed to create repo.

            Repository: ${process.env.FINAL_NAME}

            Error: ${e.message}

            👉 Please edit this issue and retry or close this and create a new issue or contact platform team if issue persists.
            `;
              core.setOutput("status", "ERROR");
              core.setOutput("error", msg);
            }

      - name: Apply Repository Topics
        id: apply_repository_topics
        continue-on-error: true
        if: steps.create_repository.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate_request.outputs.final_name }}
          TOPICS:     ${{ steps.validate_request.outputs.topics }}
        with:
          github-token: ${{ steps.generate_app_token.outputs.token }}
          script: |
            try {
              await github.rest.repos.replaceAllTopics({
                owner: context.repo.owner,
                repo: process.env.FINAL_NAME,
                names: JSON.parse(process.env.TOPICS)
              });

              core.setOutput("status", "OK");
              core.setOutput("success", "✅ Topics applied successfully.");

            } catch (e) {
              const msg = `⚠️ Failed to apply repository topics.

            Repository: ${process.env.FINAL_NAME}

            Topics:
            ${process.env.TOPICS}

            Error:
            ${e.message}
            `;
              core.setOutput("status", "ERROR");
              core.setOutput("error", msg);
            }

      - name: Set Repository Metadata Variables
        id: set_repository_metadata
        continue-on-error: true
        if: steps.create_repository.outputs.status == 'OK'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate_request.outputs.final_name }}
          METADATA:   ${{ steps.validate_request.outputs.metadata }}
        with:
          github-token: ${{ steps.generate_app_token.outputs.token }}
          script: |
            const metadata = JSON.parse(process.env.METADATA);
            let failures = [];
            let successCount = 0;

            for (const [key, value] of Object.entries(metadata)) {
              if (value === null || value === undefined) continue;

              try {
                await github.rest.actions.createRepoVariable({
                  owner: context.repo.owner,
                  repo: process.env.FINAL_NAME,
                  name: key,
                  value: String(value)
                });
                successCount++;
              } catch (e) {
                failures.push(`Variable: ${key}\nError: ${e.message}`);
              }
            }

            if (failures.length === 0) {
              core.setOutput("status", "OK");
              core.setOutput("success", "✅ Metadata variables applied successfully.");
            } else {
              const msg = `⚠️ Some repository metadata variables failed to be created.

            Repository: ${process.env.FINAL_NAME}

            Successful: ${successCount}
            Failed: ${failures.length}

            Failure details:
            ${failures.join("\n\n")}
            `;
              core.setOutput("status", "ERROR");
              core.setOutput("error", msg);
            }

      - name: Copy Organization Variables to Repository
        id: copy_organization_variables
        continue-on-error: true
        if: steps.create_repository.outputs.status == 'OK' && steps.validate_request.outputs.visibility == 'private'
        uses: actions/github-script@v9
        env:
          FINAL_NAME: ${{ steps.validate_request.outputs.final_name }}
        with:
          github-token: ${{ steps.generate_app_token.outputs.token }}
          script: |
            let failures = [];
            let skipped = [];
            let successCount = 0;
            let total = 0;

            let allVars;

            try {
              allVars = await github.paginate(
                github.rest.actions.listOrgVariables,
                { org: context.repo.owner }
              );
            } catch (e) {
              const msg = `⚠️ Failed to fetch organization variables.

            Error: ${e.message}
            `;
              core.setOutput("status", "ERROR");
              core.setOutput("error", msg);
              return;
            }

            if (!allVars || allVars.length === 0) {
              core.setOutput("status", "OK");
              core.setOutput("info", JSON.stringify(["ℹ️ No organization variables found."]));
              return;
            }

            for (const v of allVars) {
              total++;

              if (v.visibility === "selected") {
                skipped.push(v.name);
                continue;
              }

              try {
                await github.rest.actions.createRepoVariable({
                  owner: context.repo.owner,
                  repo: process.env.FINAL_NAME,
                  name: v.name,
                  value: v.value
                });
                successCount++;
              } catch (e) {
                failures.push(`Variable: ${v.name}\nError: ${e.message}`);
              }
            }

            let infoMsg = "";

            if (skipped.length > 0) {
              infoMsg = `ℹ️ Skipped organization variables with restricted visibility ("selected"):

            ${skipped.join("\n")}
            `;
            }

            core.setOutput("info", infoMsg);

            if (failures.length === 0) {
              core.setOutput("status", "OK");
              core.setOutput("success", "✅ Organization variables copied successfully.");
            } else {
              const msg = `⚠️ Some organization variables failed to copy.

            Repository: ${process.env.FINAL_NAME}

            Total Variables: ${total}
            Successfully Copied: ${successCount}
            Skipped (restricted): ${skipped.length}
            Failed: ${failures.length}

            Failure details:
            ${failures.join("\n\n")}
            `;
              core.setOutput("status", "ERROR");
              core.setOutput("error", msg);
            }

