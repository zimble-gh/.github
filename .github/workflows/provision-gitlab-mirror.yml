name: Provision GitLab Mirror

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:
      - name: Read required variables & secrets
        uses: actions/github-script@v9

        env:
          GH_APP_ID:                 ${{ secrets.GH_APP_ID || vars.GH_APP_ID }}
          GH_APP_PRIVATE_KEY:        ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}
          GITLAB_HOST:               ${{ secrets.GITLAB_HOST || vars.GITLAB_HOST }}
          GITLAB_API_TOKEN:          ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          GITLAB_TOP_LEVEL_GROUP_ID: ${{ secrets.GITLAB_TOP_LEVEL_GROUP_ID || vars.GITLAB_TOP_LEVEL_GROUP_ID }}
          GITLAB_MY_ORG_SUBGROUP:    ${{ secrets.GITLAB_MY_ORG_SUBGROUP || vars.GITLAB_MY_ORG_SUBGROUP }}

        with:
          script: |

            const requiredVarsAndSecrets = {
              "GH_APP_ID"                 : process.env.GH_APP_ID,
              "GH_APP_PRIVATE_KEY"        : process.env.GH_APP_PRIVATE_KEY,
              "GITLAB_HOST"               : process.env.GITLAB_HOST,
              "GITLAB_API_TOKEN"          : process.env.GITLAB_API_TOKEN,
              "GITLAB_TOP_LEVEL_GROUP_ID" : process.env.GITLAB_TOP_LEVEL_GROUP_ID,
              "GITLAB_MY_ORG_SUBGROUP"    : process.env.GITLAB_MY_ORG_SUBGROUP
            };

            const missingVarsAndSecrets = Object.keys(requiredVarsAndSecrets).filter((key) => !requiredVarsAndSecrets[key]);

            if (missingVarsAndSecrets.length > 0) {
              const repoFullName = `${context.repo.owner}/${context.repo.repo}`;
              const repoVisibility = context.payload.repository.visibility;
              const isPrivateRepo = repoVisibility === "private";
              const errorMessage = "\nCould not detect below required variables and secrets.\n" + missingVarsAndSecrets.map((key) => "- " + key).join("\n");
              let troubleshootInstructions = [];

              if (!isPrivateRepo) {
                troubleshootInstructions.push(`This repository '${repoFullName}' is public`);
                troubleshootInstructions.push("For public repositories, setting the required variables and secrets at the organization level is sufficient.");
                troubleshootInstructions.push("So, perhaps required variables and secrets are not set up properly at the organization level.");
                troubleshootInstructions.push("Please set those and rerun this action.");
              } else {
                troubleshootInstructions.push(`This repository '${repoFullName}' is private.`);
                troubleshootInstructions.push("Private repositories can consume organization level variables and secrets only with paid plan");
                troubleshootInstructions.push("Run the 'Sync Secrets & Variables Across Private Repos' action to set the required variables and secrets at the repository level.");
                troubleshootInstructions.push("Or, kindly upgrade the plan to consume the required variables and secrets from the organization level.");
              }

              const troubleshootMessage = troubleshootInstructions.map((msg, index) => String(index + 1).padStart(troubleshootInstructions.length, ' ') + ". " + msg).join("\n");

              core.setFailed(`${errorMessage}\n\n${troubleshootMessage}`);
              return;
            }

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create or update GitLab project
        id: provision
        uses: actions/github-script@v9

        env:
          GITLAB_HOST:               ${{ secrets.GITLAB_HOST || vars.GITLAB_HOST }}
          GITLAB_API_TOKEN:          ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          GITLAB_TOP_LEVEL_GROUP_ID: ${{ secrets.GITLAB_TOP_LEVEL_GROUP_ID || vars.GITLAB_TOP_LEVEL_GROUP_ID }}
          GITLAB_MY_ORG_SUBGROUP:    ${{ secrets.GITLAB_MY_ORG_SUBGROUP || vars.GITLAB_MY_ORG_SUBGROUP }}

        with:
          script: |

            const GITLAB_HOST               = process.env.GITLAB_HOST;
            const GITLAB_API_TOKEN          = process.env.GITLAB_API_TOKEN;
            const GITLAB_TOP_LEVEL_GROUP_ID = process.env.GITLAB_TOP_LEVEL_GROUP_ID;
            const GITLAB_MY_ORG_SUBGROUP    = process.env.GITLAB_MY_ORG_SUBGROUP;

            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;
            // const repoVisibility = context.payload.repository.visibility;

            console.log("\n====================================================");
            console.log("      GitLab Mirror Provisioning Started");
            console.log("====================================================");
            console.log(`GitHub Repo : ${repoFullName}`);
            console.log(`GitLab Host : ${GITLAB_HOST}`);
            console.log("");

            // ─────────────────────────────────────────────
            // 1. Read repository topics
            // ─────────────────────────────────────────────

            console.log("Reading repository topics...");

            const { data: topicData } = await github.rest.repos.getAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const topics = topicData.names;

            console.log(`Topics detected : ${topics.join(", ")}`);

            function extractTopic(prefix) {
              const match = topics.find(t => t.startsWith(`${prefix}-`));
              return match ? match.slice(prefix.length + 1) : null;
            }

            const product = extractTopic("product");
            const aspect  = extractTopic("aspect");
            const name    = extractTopic("repo");
            const tenant  = extractTopic("tenant");

            if (!product || !aspect || !name) {
              core.setFailed(
                `Missing required topics. Expected: product-*, aspect-*, repo-*`
              );
              return;
            }

            console.log("");
            console.log("Resolved Metadata");
            console.log("------------------------------");
            console.log(`Product : ${product}`);
            console.log(`Aspect  : ${aspect}`);
            console.log(`Name    : ${name}`);
            console.log(`Tenant  : ${tenant ?? "none"}`);
            console.log("");

            // ─────────────────────────────────────────────
            // 2. GitLab API helpers
            // ─────────────────────────────────────────────

            async function glFetch(method, path, body) {

              const res = await fetch(`${GITLAB_HOST}/api/v4${path}`, {
                method,
                headers: {
                  "PRIVATE-TOKEN": GITLAB_API_TOKEN,
                  "Content-Type": "application/json"
                },
                ...(body ? { body: JSON.stringify(body) } : {})
              });

              const data = await res.json();

              if (!res.ok) {
                throw new Error(
                  `GitLab API error [${method} ${path}] -> ${JSON.stringify(data)}`
                );
              }

              return data;
            }

            async function findOrCreateGroup(parentId, groupPath, groupName) {

              const res = await fetch(
                `${GITLAB_HOST}/api/v4/groups/${parentId}/subgroups?search=${encodeURIComponent(groupPath)}&per_page=100`,
                { headers: { "PRIVATE-TOKEN": GITLAB_API_TOKEN } }
              );

              const subgroups = await res.json();

              const existing = subgroups.find(
                g => g.path === groupPath || g.name === groupPath
              );

              if (existing) {
                console.log(`  ✓ Group exists : ${existing.full_path} (id=${existing.id})`);
                return existing;
              }

              console.log(`  → Creating group : ${groupName}`);

              const created = await glFetch("POST", "/groups", {
                name: groupName,
                path: groupPath,
                parent_id: parseInt(parentId),
                visibility: "private"
              });

              console.log(`  ✓ Group created : ${created.full_path} (id=${created.id})`);

              return created;
            }

            // ─────────────────────────────────────────────
            // 3. Build GitLab group hierarchy
            // ─────────────────────────────────────────────
            //
            // Without tenant:
            //   top-level-group
            //   └── GITLAB_MY_ORG_SUBGROUP
            //       └── product
            //           └── aspect
            //               └── repo
            //
            // With tenant:
            //   top-level-group
            //   └── tenant
            //       └── product
            //           └── aspect
            //               └── repo
            //

            console.log("");
            console.log("Resolving GitLab group hierarchy...");
            console.log("------------------------------------");

            const secondLevelPath = tenant ? `${GITLAB_MY_ORG_SUBGROUP}-${tenant}` : GITLAB_MY_ORG_SUBGROUP;

            const secondLevel  = await findOrCreateGroup(
              GITLAB_TOP_LEVEL_GROUP_ID,
              secondLevelPath,
              secondLevelPath
            );

            const productGroup = await findOrCreateGroup(
              secondLevel.id,
              product,
              product
            );

            const aspectGroup = await findOrCreateGroup(
              productGroup.id,
              aspect,
              aspect
            );

            console.log("");
            console.log(`Resolved final namespace : ${aspectGroup.full_path}`);

            // ─────────────────────────────────────────────
            // 4. Find or create GitLab project
            // ─────────────────────────────────────────────

            // const visibility = repoVisibility === "public" ? "public" : "private";

            console.log("");
            console.log(`Searching for project '${name}'...`);

            const projectsRes = await fetch(
              `${GITLAB_HOST}/api/v4/groups/${aspectGroup.id}/projects?search=${encodeURIComponent(name)}&per_page=100`,
              { headers: { "PRIVATE-TOKEN": GITLAB_API_TOKEN } }
            );

            const projects = await projectsRes.json();

            const existing = projects.find(
              p => p.path === name || p.name === name
            );

            let projectId;
            let projectUrl;
            let projectPath;

            if (existing) {

              projectId   = existing.id;
              projectUrl  = existing.web_url;
              projectPath = existing.path_with_namespace;

              console.log(`✓ Existing project found : ${projectUrl} (id=${projectId})`);

            } else {

              console.log(`Creating GitLab project '${name}'...`);

              const created = await glFetch("POST", "/projects", {
                name: name,
                path: name,
                namespace_id: aspectGroup.id,
                // visibility: visibility
                visibility: "private"
              });

              projectId   = created.id;
              projectUrl  = created.web_url;
              projectPath = created.path_with_namespace;

              console.log(`✓ Project created : ${projectUrl} (id=${projectId})`);
            }

            console.log("");
            console.log(`GitLab project path : ${projectPath}`);

            core.setOutput("project_path", projectPath);

      # ─────────────────────────────────────────────
      # 5. Push mirror to GitLab
      # ─────────────────────────────────────────────

      - name: Generate GitHub App Token
        uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id:      ${{ secrets.GH_APP_ID || vars.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}

      - name: Mirror Repository
        env:
          GITLAB_HOST:      ${{ secrets.GITLAB_HOST || vars.GITLAB_HOST }}
          GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          PROJECT_PATH:     ${{ steps.provision.outputs.project_path }}
        run: |

          echo ""
          echo "--------------------------------------------------"
          echo "Starting GitHub → GitLab mirror push"
          echo "--------------------------------------------------"

          git clone --mirror https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git
          cd $(basename ${{ github.repository }}).git
          GITLAB_URL="https://oauth2:${GITLAB_API_TOKEN}@${GITLAB_HOST#https://}/${PROJECT_PATH}.git"
          git remote add gitlab "$GITLAB_URL" || true
          git push --mirror gitlab

          echo ""
          echo "--------------------------------------------------"
          echo "GitHub → GitLab mirror completed"
          echo "--------------------------------------------------"
