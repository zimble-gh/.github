name: Provision GitLab Mirror

on:
  workflow_dispatch:
    inputs:
      auto_build:
        description: "Auto-run the build for the selected branch on GitLab"
        type: boolean
        default: false
  workflow_call:
    inputs:
      auto_build:
        description: "Auto-run the build for the selected branch on GitLab"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync_to_gitlab:
    name: Sync To GitLab
    runs-on: ubuntu-latest

    env:
      # Compliant branch names (must match the definitions' workflow: rules).
      # Shared by the auto-build and mirror-push steps.
      COMPLIANT_BRANCH_REGEX: '^(feature/.*|fix/.*|chore/.*|hotfix/v[0-9]+\.[0-9]+\.[0-9]+|release/v[0-9]+\.[0-9]+|main)$'

    steps:

      # --------------------------------------------------
      # Step 1: Validate Required Configuration
      # --------------------------------------------------

      - name: Validate Required Configuration
        id: validate_required_config
        uses: actions/github-script@v9
        env:
          GH_APP_ID:                 ${{ secrets.GH_APP_ID || vars.GH_APP_ID }}
          GH_APP_CLIENT_ID:          ${{ secrets.GH_APP_CLIENT_ID || vars.GH_APP_CLIENT_ID }}
          GH_APP_PRIVATE_KEY:        ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}
          GITLAB_HOST:               ${{ secrets.GITLAB_HOST || vars.GITLAB_HOST }}
          GITLAB_API_TOKEN:          ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          GITLAB_TOP_LEVEL_GROUP_ID: ${{ secrets.GITLAB_TOP_LEVEL_GROUP_ID || vars.GITLAB_TOP_LEVEL_GROUP_ID }}
          GITLAB_MY_ORG_SUBGROUP:    ${{ secrets.GITLAB_MY_ORG_SUBGROUP || vars.GITLAB_MY_ORG_SUBGROUP }}
        with:
          script: |
            const required = {
              "GH_APP_ID"                 : process.env.GH_APP_ID,
              "GH_APP_CLIENT_ID"          : process.env.GH_APP_CLIENT_ID,
              "GH_APP_PRIVATE_KEY"        : process.env.GH_APP_PRIVATE_KEY,
              "GITLAB_HOST"               : process.env.GITLAB_HOST,
              "GITLAB_API_TOKEN"          : process.env.GITLAB_API_TOKEN,
              "GITLAB_TOP_LEVEL_GROUP_ID" : process.env.GITLAB_TOP_LEVEL_GROUP_ID,
              "GITLAB_MY_ORG_SUBGROUP"    : process.env.GITLAB_MY_ORG_SUBGROUP
            };

            const missing = Object.keys(required).filter((key) => !required[key]);

            if (missing.length > 0) {
              const repoFullName   = `${context.repo.owner}/${context.repo.repo}`;
              const repoVisibility = context.payload.repository.visibility;
              const isPrivateRepo  = repoVisibility === "private";
              const errorMessage   = "\n❌ Could not detect below required variables and secrets.\n" + missing.map((key) => "- " + key).join("\n");
              let troubleshootInstructions = [];

              if (!isPrivateRepo) {
                troubleshootInstructions.push(`This repository '${repoFullName}' is public`);
                troubleshootInstructions.push("For public repositories, setting the required variables and secrets at the organization level is sufficient.");
                troubleshootInstructions.push("So, perhaps required variables and secrets are not set up properly at the organization level.");
                troubleshootInstructions.push("Please set those and rerun this action.");
              } else {
                troubleshootInstructions.push(`This repository '${repoFullName}' is private.`);
                troubleshootInstructions.push("Private repositories can consume organization level variables and secrets only with paid plan");
                troubleshootInstructions.push("Run the 'Sync Secrets & Variables Across Private Repos' action to set the required variables and secrets at the repository level.");
                troubleshootInstructions.push("Or, kindly upgrade the plan to consume the required variables and secrets from the organization level.");
              }

              const troubleshootMessage = troubleshootInstructions.map((msg, index) => String(index + 1).padStart(troubleshootInstructions.length, ' ') + ". " + msg).join("\n");

              core.setFailed(`${errorMessage}\nℹ️ Follow the below instructions\n${troubleshootMessage}`);
              return;
            }

      # --------------------------------------------------
      # Step 2: Validate And Extract Repository Metadata
      # --------------------------------------------------

      - name: Validate Repository Metadata
        id: validate_repository_metadata
        if: always()
        uses: actions/github-script@v9
        env:
          PRODUCT_LINE: ${{ vars.REPO_METADATA_PRODUCT_LINE }}
          ASPECT:       ${{ vars.REPO_METADATA_ASPECT }}
          NAME:         ${{ vars.REPO_METADATA_NAME }}
          TYPE:         ${{ vars.REPO_METADATA_TYPE }}
          TENANT:       ${{ vars.REPO_METADATA_TENANT }}
          MANAGED:      ${{ vars.REPO_METADATA_MANAGED }}
        with:
          script: |
            console.log("\nValidating repository metadata...");

            if (!process.env.MANAGED || process.env.MANAGED.toLowerCase() !== "true") {
              core.setFailed("\n❌ Repository is not configured for GitLab sync (REPO_METADATA_MANAGED != true)");
              return;
            }

            const required = {
              PRODUCT_LINE : process.env.PRODUCT_LINE,
              ASPECT       : process.env.ASPECT,
              NAME         : process.env.NAME,
              TYPE         : process.env.TYPE,
              MANAGED      : process.env.MANAGED
            };

            const missing = Object.entries(required)
              .filter(([_, v]) => !v)
              .map(([k]) => k);

            if (missing.length > 0) {
              core.setFailed(
                `\n❌ Missing required metadata:\n${missing.map(m => "- REPO_METADATA_" + m).join("\n")}`
              );
              return;
            }

            console.log("Metadata validated successfully");
            console.log(`ℹ️ ProductLine : ${process.env.PRODUCT_LINE}`);
            console.log(`ℹ️ Aspect      : ${process.env.ASPECT}`);
            console.log(`ℹ️ Repo Name   : ${process.env.NAME}`);
            console.log(`ℹ️ Repo Type   : ${process.env.TYPE}`);

            if (process.env.TENANT) {
              console.log(`ℹ️ Tenant      : ${process.env.TENANT}`);
            } else {
              console.log("ℹ️ Tenant      : none");
            }

            core.setOutput("product_line", process.env.PRODUCT_LINE);
            core.setOutput("aspect", process.env.ASPECT);
            core.setOutput("name", process.env.NAME);
            core.setOutput("tenant", process.env.TENANT || "");

      # --------------------------------------------------
      # Step 3: Ensure GitLab Project Exists
      # --------------------------------------------------

      - name: Ensure GitLab Project Exists
        id: ensure_gitlab_project_exists
        uses: actions/github-script@v9
        env:
          GITLAB_HOST:               ${{ secrets.GITLAB_HOST || vars.GITLAB_HOST }}
          GITLAB_API_TOKEN:          ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          GITLAB_TOP_LEVEL_GROUP_ID: ${{ secrets.GITLAB_TOP_LEVEL_GROUP_ID || vars.GITLAB_TOP_LEVEL_GROUP_ID }}
          GITLAB_MY_ORG_SUBGROUP:    ${{ secrets.GITLAB_MY_ORG_SUBGROUP || vars.GITLAB_MY_ORG_SUBGROUP }}
          PRODUCT_LINE:              ${{ steps.validate_repository_metadata.outputs.product_line }}
          ASPECT:                    ${{ steps.validate_repository_metadata.outputs.aspect }}
          NAME:                      ${{ steps.validate_repository_metadata.outputs.name }}
          TENANT:                    ${{ steps.validate_repository_metadata.outputs.tenant }}
        with:
          script: |
            const GITLAB_HOST               = process.env.GITLAB_HOST;
            const GITLAB_API_TOKEN          = process.env.GITLAB_API_TOKEN;
            const GITLAB_TOP_LEVEL_GROUP_ID = process.env.GITLAB_TOP_LEVEL_GROUP_ID;
            const GITLAB_MY_ORG_SUBGROUP    = process.env.GITLAB_MY_ORG_SUBGROUP;

            const product = process.env.PRODUCT_LINE;
            const aspect  = process.env.ASPECT;
            const name    = process.env.NAME;
            const tenant  = process.env.TENANT;

            async function glFetch(method, path, body) {
              const res = await fetch(`${GITLAB_HOST}/api/v4${path}`, {
                method,
                headers: {
                  "PRIVATE-TOKEN" : GITLAB_API_TOKEN,
                  "Content-Type"  : "application/json"
                },
                ...(body ? { body : JSON.stringify(body) } : {})
              });
              const data = await res.json();
              if (!res.ok) {
                let errorMessage = `GitLab API error [${method} ${path}] -> ${res.status} ${res.statusText}`;
                if (res.status === 404) {
                  errorMessage += `\nThis may indicate insufficient permissions for the GITLAB_API_TOKEN or that the resource does not exist.`;
                } else if (res.status === 401 || res.status === 403) {
                  errorMessage += `\nThis likely indicates an issue with the GITLAB_API_TOKEN permissions.`;
                } else {
                  errorMessage += `\nResponse: ${JSON.stringify(data)}`;
                }
                throw new Error(errorMessage);
              }
              return data;
            }

            async function findOrCreateGroup(parentId, groupName) {
              const subgroups = await glFetch("GET",
                `/groups/${parentId}/subgroups?search=${encodeURIComponent(groupName)}&per_page=100`
              );
              const existing = subgroups.find(
                g => g.path === groupName || g.name === groupName
              );
              if (existing) {
                console.log(`  ✓ Group exists : ${existing.full_path} (id=${existing.id})`);
                return existing;
              }
              console.log(`  → Creating group : ${groupName}`);
              const created = await glFetch("POST", "/groups", {
                name       : groupName,
                path       : groupName,
                parent_id  : parseInt(parentId),
                visibility : "private"
              });
              console.log(`  ✓ Group created : ${created.full_path} (id=${created.id})`);
              return created;
            }

            async function findOrCreateProject(groupId, projectName) {
              const projects = await glFetch("GET",
                `/groups/${groupId}/projects?search=${encodeURIComponent(projectName)}&per_page=100`
              );
              const existing = projects.find(
                p => p.path === projectName || p.name === projectName
              );
              if (existing) {
                console.log(`  ✓ Project exists : ${existing.web_url} (id=${existing.id})`);
                return existing;
              }
              console.log(`  → Creating project : ${projectName}`);
              const created = await glFetch("POST", "/projects", {
                name          : projectName,
                path          : projectName,
                namespace_id  : groupId,
                visibility    : "private"
              });
              console.log(`  ✓ Project created : ${created.web_url} (id=${created.id})`);
              return created;
            }

            // ─────────────────────────────────────────────
            // Build GitLab group hierarchy
            // ─────────────────────────────────────────────
            //
            // Without tenant:                  With tenant:
            //   top-level-group                  top-level-group
            //   └── GITLAB_MY_ORG_SUBGROUP       └── tenant
            //       └── product                      └── product
            //           └── aspect                       └── aspect
            //               └── repo                         └── repo

            console.log("");
            console.log("ℹ️ Resolving GitLab group hierarchy...");
            console.log("------------------------------------");

            try {
              const orgSubgroupName = tenant ? `${GITLAB_MY_ORG_SUBGROUP}-${tenant}` : GITLAB_MY_ORG_SUBGROUP;

              const orgSubgroup = await findOrCreateGroup(GITLAB_TOP_LEVEL_GROUP_ID, orgSubgroupName);
              const productLineSubgroup = await findOrCreateGroup(orgSubgroup.id, product);
              const aspectSubgroup = await findOrCreateGroup(productLineSubgroup.id, aspect);

              console.log(`\nℹ️ Resolved final namespace : ${aspectSubgroup.full_path}`);
              console.log(`\nℹ️ Searching for project '${name}'...`);

              const project = await findOrCreateProject(aspectSubgroup.id, name);

              console.log(`\nℹ️ GitLab project path : ${project.path_with_namespace}`);

              core.setOutput("project_path", project.path_with_namespace);
              core.setOutput("project_id", project.id);
            } catch (error) {
              core.setFailed(`\n❌ Failed to ensure GitLab project exists\n${error.message}`);
              core.setOutput("project_path", "");
              core.setOutput("project_id", "");
            }

      # --------------------------------------------------
      # Step 4: Ensure GitLab CICD Variable GH_PROJECT_REPO
      # --------------------------------------------------

      - name: Ensure GitLab CICD Variable GH_PROJECT_REPO
        id: ensure_gitlab_gh_project_repo_variable
        if: ${{ steps.ensure_gitlab_project_exists.outputs.project_id != '' }}
        uses: actions/github-script@v9
        env:
          GITLAB_HOST:      ${{ secrets.GITLAB_HOST || vars.GITLAB_HOST }}
          GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          PROJECT_ID:       ${{ steps.ensure_gitlab_project_exists.outputs.project_id }}
          GH_PROJECT_REPO:  ${{ github.repository }}
        with:
          script: |
            const GITLAB_HOST      = process.env.GITLAB_HOST;
            const GITLAB_API_TOKEN = process.env.GITLAB_API_TOKEN;
            const PROJECT_ID       = process.env.PROJECT_ID;

            const VARIABLE_KEY   = "GH_PROJECT_REPO";
            const VARIABLE_VALUE = process.env.GH_PROJECT_REPO;

            // GitLab CICD variable options:
            //   environment_scope = "*"     -> all environments
            //   masked            = false   -> visible (not masked)
            //   protected         = false   -> not protected
            //   raw               = false   -> expand enabled, so it is interpolable in .gitlab-ci.yml
            const variableOptions = {
              variable_type     : "env_var",
              environment_scope : "*",
              masked            : false,
              protected         : false,
              raw               : false,
              description       : "GitHub source repo of the project."
            };

            async function glRequest(method, path, body) {
              const res = await fetch(`${GITLAB_HOST}/api/v4${path}`, {
                method,
                headers: {
                  "PRIVATE-TOKEN" : GITLAB_API_TOKEN,
                  "Content-Type"  : "application/json"
                },
                ...(body ? { body : JSON.stringify(body) } : {})
              });

              // Preserve the raw response body so a GitLab error is never lost: parse it as
              // JSON when possible, otherwise keep the raw text (e.g. an HTML/plain error).
              let data = null;
              if (res.status !== 204) {
                const text = await res.text().catch(() => "");
                if (text) {
                  try {
                    data = JSON.parse(text);
                  } catch {
                    data = text;
                  }
                }
              }
              return { status : res.status, ok : res.ok, data };
            }

            // Extract a human-readable message from a GitLab error response body. GitLab
            // returns errors as a string ('message'/'error'), as field -> [messages]
            // (e.g. { message: { base: ["..."] } }), or occasionally as raw text.
            function describeGlError(data) {
              if (!data) {
                return "(no response body)";
              }
              if (typeof data === "string") {
                return data;
              }
              if (typeof data.error === "string") {
                return data.error;
              }
              if (typeof data.message === "string") {
                return data.message;
              }
              if (data.message && typeof data.message === "object") {
                return Object.entries(data.message)
                  .map(([field, msgs]) => `${field}: ${Array.isArray(msgs) ? msgs.join("; ") : msgs}`)
                  .join(" | ");
              }
              return JSON.stringify(data);
            }

            console.log("");
            console.log(`ℹ️ Ensuring GitLab CICD variable '${VARIABLE_KEY}'...`);
            console.log("------------------------------------");

            try {
              const existing = await glRequest("GET", `/projects/${PROJECT_ID}/variables/${VARIABLE_KEY}`);

              if (existing.status === 404) {
                console.log(`  → Variable not found - creating '${VARIABLE_KEY}'`);
                const created = await glRequest("POST", `/projects/${PROJECT_ID}/variables`, {
                  key   : VARIABLE_KEY,
                  value : VARIABLE_VALUE,
                  ...variableOptions
                });
                if (!created.ok) {
                  throw new Error(`Failed to create variable -> ${created.status} ${describeGlError(created.data)}`);
                }
                console.log(`  ✓ Variable created : ${VARIABLE_KEY}=${VARIABLE_VALUE}`);
              } else if (existing.ok) {
                if (existing.data.value === VARIABLE_VALUE) {
                  console.log(`  ✓ Variable already up to date : ${VARIABLE_KEY}=${VARIABLE_VALUE}`);
                } else {
                  console.log(`  → Variable differs (current='${existing.data.value}') - updating to '${VARIABLE_VALUE}'`);
                  const updated = await glRequest("PUT", `/projects/${PROJECT_ID}/variables/${VARIABLE_KEY}`, {
                    value : VARIABLE_VALUE,
                    ...variableOptions
                  });
                  if (!updated.ok) {
                    throw new Error(`Failed to update variable -> ${updated.status} ${describeGlError(updated.data)}`);
                  }
                  console.log(`  ✓ Variable updated : ${VARIABLE_KEY}=${VARIABLE_VALUE}`);
                }
              } else {
                throw new Error(`Unexpected response fetching variable -> ${existing.status} ${describeGlError(existing.data)}`);
              }
            } catch (error) {
              core.setFailed(`\n❌ Failed to ensure GitLab CICD variable '${VARIABLE_KEY}'\n${error.message}`);
            }

      # --------------------------------------------------
      # Step 5: Sync GitHub Variables To GitLab CICD
      # --------------------------------------------------

      - name: Sync GitHub Variables To GitLab CICD
        id: sync_github_variables_to_gitlab
        if: ${{ steps.ensure_gitlab_project_exists.outputs.project_id != '' }}
        uses: actions/github-script@v9
        env:
          GITLAB_HOST:      ${{ secrets.GITLAB_HOST || vars.GITLAB_HOST }}
          GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          PROJECT_ID:       ${{ steps.ensure_gitlab_project_exists.outputs.project_id }}
          ALL_GH_VARS:      ${{ toJSON(vars) }}
          ALL_GH_SECRETS:   ${{ toJSON(secrets) }}
        with:
          script: |
            const GITLAB_HOST      = process.env.GITLAB_HOST;
            const GITLAB_API_TOKEN = process.env.GITLAB_API_TOKEN;
            const PROJECT_ID       = process.env.PROJECT_ID;

            // Variables to sync are sourced from GitHub Actions variables and secrets.
            // The name follows a fixed grammar:  GL_<flags>__<name>
            // A double underscore separates the 'GL_' prefix (plus optional flag block)
            // from the actual variable name. The flag block sets boolean GitLab
            // properties, in any order/combination:
            //   M -> masked    P -> protected    R -> raw (expansion disabled)
            //   H -> masked and hidden (implies masked; value is write-only in GitLab)
            // The 'GL_<flags>__' part is stripped before saving:
            //   GL__<name>       -> masked=false, protected=false, raw=false  (no flags)
            //   GL_M__<name>     -> masked
            //   GL_P__<name>     -> protected
            //   GL_R__<name>     -> raw
            //   GL_H__<name>     -> masked and hidden
            //   GL_MP__<name>    -> masked + protected   (order/duplication independent)
            //   GL_MPR__<name>   -> masked + protected + raw   ... and every other combo
            // The 'hidden' visibility (H) can only be set when the variable is first
            // created; it cannot be toggled afterwards, and GitLab never returns a hidden
            // variable's value (so its value cannot be compared - see the sync loop).
            // The name is everything after the FIRST '__', taken verbatim. It may contain
            // underscores or flag-looking segments without ambiguity, and any extra
            // separator underscores are kept as part of the name (this is intended), e.g.
            //   GL__MP_TOKEN     -> name 'MP_TOKEN', no flags
            //   GL_M__MP_TOKEN   -> name 'MP_TOKEN', masked
            //   GL__FOO__BAR     -> name 'FOO__BAR', no flags
            //   GL___FOO         -> name '_FOO', no flags   (leading underscore preserved)
            // An invalid flag block (unknown letters or duplicates) is tolerated: the
            // variable is still synced with all flags defaulted to false, e.g.
            //   GL_X__FOO        -> name 'FOO', no flags
            const PREFIX     = "GL_";
            const SEPARATOR  = "__";
            const FLAG_PROPS = { M : "masked", P : "protected", R : "raw", H : "hidden" };

            // Parse a GitHub key into the GitLab key + resolved flags, or null if it is
            // not a syncable 'GL_<flags>__<name>' variable.
            function parseGlKey(ghKey) {
              if (!ghKey.startsWith(PREFIX)) {
                return null;
              }

              // Split the prefix/flag head from the name at the first double underscore.
              const sepIdx = ghKey.indexOf(SEPARATOR);
              if (sepIdx === -1) {
                return null;
              }

              const flagBlock = ghKey.slice(PREFIX.length, sepIdx);   // chars between 'GL_' and '__'
              const name      = ghKey.slice(sepIdx + SEPARATOR.length);
              if (!name) {
                return null;
              }

              const flags = { masked : false, protected : false, raw : false, hidden : false };

              // Empty flag block (GL__<name>) means "all flags default". A non-empty block
              // is applied only when valid (known M/P/R letters, no duplicates); an invalid
              // block is tolerated and falls back to the default flag values.
              if (flagBlock.length > 0) {
                const chars    = flagBlock.split("");
                const allFlags = chars.every((c) => FLAG_PROPS[c]);
                const noDupes  = new Set(chars).size === chars.length;
                if (allFlags && noDupes) {
                  for (const c of chars) {
                    flags[FLAG_PROPS[c]] = true;
                  }
                }
              }

              return { glKey : name, ...flags };
            }

            const allGhVars    = JSON.parse(process.env.ALL_GH_VARS    || "{}");
            const allGhSecrets = JSON.parse(process.env.ALL_GH_SECRETS || "{}");

            // GitLab CICD variable options common to every synced variable:
            //   variable_type     = "env_var" -> environment variable
            //   environment_scope = "*"       -> all environments
            // ('masked', 'protected' and 'raw' are resolved per variable from its flags.
            //  raw=false keeps the value interpolable in .gitlab-ci.yml.)
            const baseVariableOptions = {
              variable_type     : "env_var",
              environment_scope : "*"
            };

            async function glRequest(method, path, body) {
              const res = await fetch(`${GITLAB_HOST}/api/v4${path}`, {
                method,
                headers: {
                  "PRIVATE-TOKEN" : GITLAB_API_TOKEN,
                  "Content-Type"  : "application/json"
                },
                ...(body ? { body : JSON.stringify(body) } : {})
              });
              // Preserve the raw response body so a GitLab error is never lost: parse it as
              // JSON when possible, otherwise keep the raw text (e.g. an HTML/plain error).
              let data = null;
              if (res.status !== 204) {
                const text = await res.text().catch(() => "");
                if (text) {
                  try {
                    data = JSON.parse(text);
                  } catch {
                    data = text;
                  }
                }
              }
              return { status : res.status, ok : res.ok, data };
            }

            // GitLab's requirements for masked (and masked-and-hidden) variable values.
            // Surfaced when a create/update is rejected for violating these rules.
            const MASKING_RULES = [
              "GitLab masking requirements for masked / hidden variable values:",
              "  - must be a single line (no newlines)",
              "  - must be at least 8 characters long",
              "  - must not contain whitespace",
              "  - may only use Base64 characters (A-Z a-z 0-9 + / =) plus '@', ':', '.', '~', '-'"
            ].join("\n");

            // Extract a human-readable message from a GitLab error response body. GitLab
            // returns errors as a string ('message'/'error') or as field -> [messages]
            // (e.g. { message: { base: ["...does not meet the masking requirements"] } }).
            function describeGlError(data) {
              if (!data) {
                return "(no response body)";
              }
              if (typeof data === "string") {
                return data;
              }
              if (typeof data.error === "string") {
                return data.error;
              }
              if (typeof data.message === "string") {
                return data.message;
              }
              if (data.message && typeof data.message === "object") {
                return Object.entries(data.message)
                  .map(([field, msgs]) => `${field}: ${Array.isArray(msgs) ? msgs.join("; ") : msgs}`)
                  .join(" | ");
              }
              return JSON.stringify(data);
            }

            // Build the error thrown when a create/update fails, appending GitLab's masking
            // rules when the rejection looks masking-related and the value was masked.
            function glWriteError(action, response, wasMasked) {
              const detail = describeGlError(response.data);
              let message = `Failed to ${action} variable -> ${response.status} ${detail}`;
              if (wasMasked && /mask/i.test(detail)) {
                message += `\n  ℹ️ The value appears to violate GitLab's masking rules.\n${MASKING_RULES}`;
              }
              return message;
            }

            // Collect the variables to sync, resolving the GitLab key + flags from the name.
            // Scanning both variables and secrets keeps the flags driven purely by the name.
            const toSync = [];
            for (const source of [allGhVars, allGhSecrets]) {
              for (const [ghKey, value] of Object.entries(source)) {
                const parsed = parseGlKey(ghKey);
                if (parsed) {
                  toSync.push({ ghKey, value, ...parsed });
                }
              }
            }

            console.log("");
            console.log(`ℹ️ Syncing ${toSync.length} GitHub variable(s) to GitLab CICD...`);
            console.log("------------------------------------");

            if (toSync.length === 0) {
              console.log("  ℹ️ No syncable GL_ variables found - nothing to sync");
              return;
            }

            // Track failed variables so their GitHub + GitLab names can be reported.
            const failed = [];

            for (const { ghKey, glKey, value, masked, protected : isProtected, raw, hidden } of toSync) {
              // GitLab requires a hidden variable to also be masked.
              const desiredMasked = masked || hidden;
              const displayValue  = desiredMasked ? "***" : value;

              // Options shared by create and update. 'masked_and_hidden' is create-only
              // (the hidden visibility cannot be toggled afterwards), so it is added to the
              // create body alone; updates send the resolved 'masked' value instead.
              const sharedOptions = { ...baseVariableOptions, protected : isProtected, raw };

              try {
                const existing = await glRequest("GET", `/projects/${PROJECT_ID}/variables/${glKey}`);

                if (existing.status === 404) {
                  console.log(`  → Variable not found - creating '${glKey}' (from '${ghKey}', masked=${desiredMasked}, hidden=${hidden}, protected=${isProtected}, raw=${raw})`);
                  const createBody = { key : glKey, value : value, ...sharedOptions };
                  if (hidden) {
                    createBody.masked_and_hidden = true;   // implies masked
                  } else {
                    createBody.masked = desiredMasked;
                  }
                  const created = await glRequest("POST", `/projects/${PROJECT_ID}/variables`, createBody);
                  if (!created.ok) {
                    throw new Error(glWriteError("create", created, desiredMasked));
                  }
                  console.log(`  ✓ Variable created : ${glKey}=${displayValue}`);
                } else if (existing.ok) {
                  const isHiddenNow = existing.data.hidden === true;

                  // Hidden visibility is fixed at creation - it cannot be toggled via the API.
                  if (isHiddenNow !== hidden) {
                    throw new Error(`Cannot change hidden visibility (${isHiddenNow} -> ${hidden}) via API - delete and recreate the variable in GitLab`);
                  }

                  const maskedChanged    = existing.data.masked !== desiredMasked;
                  const protectedChanged = existing.data.protected !== isProtected;
                  const rawChanged       = existing.data.raw !== raw;
                  // Hidden variables never return their value, so it cannot be compared -
                  // refresh it on every run to keep GitLab in sync with GitHub.
                  const valueChanged     = hidden ? true : existing.data.value !== value;

                  if (!valueChanged && !maskedChanged && !protectedChanged && !rawChanged) {
                    console.log(`  ✓ Variable already up to date : ${glKey}`);
                  } else {
                    const reasons = [];
                    if (valueChanged)     reasons.push(hidden ? "value refreshed (hidden, cannot verify)" : "value changed");
                    if (maskedChanged)    reasons.push(`masked ${existing.data.masked} -> ${desiredMasked}`);
                    if (protectedChanged) reasons.push(`protected ${existing.data.protected} -> ${isProtected}`);
                    if (rawChanged)       reasons.push(`raw ${existing.data.raw} -> ${raw}`);
                    console.log(`  → Variable differs (${reasons.join(", ")}) - updating '${glKey}'`);
                    const updated = await glRequest("PUT", `/projects/${PROJECT_ID}/variables/${glKey}`, {
                      value  : value,
                      ...sharedOptions,
                      masked : desiredMasked
                    });
                    if (!updated.ok) {
                      throw new Error(glWriteError("update", updated, desiredMasked));
                    }
                    console.log(`  ✓ Variable updated : ${glKey}=${displayValue}`);
                  }
                } else {
                  throw new Error(`Unexpected response fetching variable -> ${existing.status} ${JSON.stringify(existing.data)}`);
                }
              } catch (error) {
                // Keep the full reason (including any GitLab error detail) per variable.
                failed.push({ ghKey, glKey, reason : error.message });
                core.error(`Failed to sync variable [GitHub: '${ghKey}' -> GitLab: '${glKey}']\n${error.message}`);
              }
            }

            if (failed.length > 0) {
              const failedList = failed
                .map(({ ghKey, glKey, reason }) =>
                  `- GitHub: '${ghKey}' -> GitLab: '${glKey}'\n    ${reason.replace(/\n/g, "\n    ")}`
                )
                .join("\n");
              core.setFailed(
                `\n❌ Failed to sync ${failed.length} of ${toSync.length} GitHub variable(s) to GitLab CICD:\n${failedList}`
              );
            }

      # --------------------------------------------------
      # Step 6: Generate GitHub App Token
      # --------------------------------------------------

      - name: Generate GitHub App Token
        id: generate_github_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id:   ${{ secrets.GH_APP_CLIENT_ID || vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}
          owner:       ${{ github.repository_owner }}

      # --------------------------------------------------
      # Step 7: Prepare Mirror Clone
      # --------------------------------------------------
      # Bare mirror clone of the GitHub repo + the GitLab remote. Shared by the
      # (optional) auto-build step and the full mirror push that follow. The
      # 'gitlab' remote (with its token URL) persists in repo.git/config across
      # steps, so later steps only 'cd repo.git' and push.

      - name: Prepare Mirror Clone
        id: prepare_mirror_clone
        if: ${{ steps.ensure_gitlab_project_exists.outputs.project_path != '' }}
        env:
          GITLAB_HOST:      ${{ secrets.GITLAB_HOST || vars.GITLAB_HOST }}
          GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          PROJECT_PATH:     ${{ steps.ensure_gitlab_project_exists.outputs.project_path }}
        run: |
          set -euo pipefail

          echo ""
          echo "=================================================="
          echo "🚀 Preparing GitHub → GitLab Mirror"
          echo "=================================================="
          echo "Repository    : ${{ github.repository }}"
          echo "GitLab Target : ${PROJECT_PATH}"
          echo ""

          GITHUB_URL="https://x-access-token:${{ steps.generate_github_app_token.outputs.token }}@github.com/${{ github.repository }}.git"
          GITLAB_URL="https://oauth2:${GITLAB_API_TOKEN}@${GITLAB_HOST#https://}/${PROJECT_PATH}.git"

          echo "Cloning repository in mirror mode..."
          git clone --mirror "$GITHUB_URL" repo.git

          cd repo.git

          echo "Adding GitLab remote..."
          git remote add gitlab "$GITLAB_URL"

      # --------------------------------------------------
      # Step 8: Auto-Build Selected Branch (opt-in)
      # --------------------------------------------------
      # Guarded by the auto_build input. Pushes ONLY the dispatched branch first,
      # with a GitLab CI push option so its pipeline auto-runs the build
      # (rule: $AUTO_BUILD == "true"). This advances the branch to its final SHA,
      # so the subsequent --mirror push is a no-op for it and GitLab starts no
      # second (manual) pipeline. For container-build repos it then derives and
      # displays the resulting image URL.

      - name: Auto-Build Selected Branch
        id: auto_build_selected_branch
        if: ${{ inputs.auto_build == true && steps.ensure_gitlab_project_exists.outputs.project_path != '' }}
        env:
          GITLAB_HOST:      ${{ secrets.GITLAB_HOST || vars.GITLAB_HOST }}
          GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          PROJECT_ID:       ${{ steps.ensure_gitlab_project_exists.outputs.project_id }}
        run: |
          set -euo pipefail
          cd repo.git

          BRANCH="${GITHUB_REF_NAME}"

          # Retry a git push up to 5 times. Usage: push_with_retry <push args...>
          push_with_retry() {
            for i in {1..5}; do
              echo "Attempt $i of 5..."
              if git push "$@"; then echo "✅ Push succeeded"; return 0; fi
              echo "⚠️ Attempt $i failed"
              sleep 5
            done
            return 1
          }

          # Summary helpers (write to the GitHub Actions job summary, if present).
          add_summary() { [ -n "${GITHUB_STEP_SUMMARY:-}" ] && printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY" || true; }
          skip_summary() {
            printf -v _hdr '### 📦 Container image (auto-build) — `%s`' "$BRANCH"
            add_summary "$_hdr"
            add_summary ""
            add_summary "$1"
          }

          # ==================================================================
          # PHASE 1 - Pre-push checks. A build only happens if ALL of these pass,
          # so if any fails we report it and DO NOT push (the branch is still
          # mirrored later by the full mirror step). Order:
          #   1) ref is a branch   2) branch name is compliant
          #   3) a .gitlab-ci.yml exists   4) there are new commits to push
          # ==================================================================

          # 1) Auto-build applies to branches only (tags auto-build via their own rule).
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "ℹ️ Dispatched on a ${GITHUB_REF_TYPE} ('${BRANCH}'), not a branch - skipping auto-build."
            printf -v _msg 'ℹ️ **Auto-build skipped** — dispatched on a %s (`%s`), not a branch.' "${GITHUB_REF_TYPE}" "$BRANCH"
            add_summary "$_msg"
            exit 0
          fi

          # 2) A pipeline is only created for compliant branch names (matching the
          # definitions' workflow: rules), so a non-compliant branch must NOT be
          # pushed for a build - it would never build anyway.
          if ! printf '%s' "$BRANCH" | grep -qE "$COMPLIANT_BRANCH_REGEX"; then
            echo "::warning::Branch '${BRANCH}' is not a compliant branch name - not pushing; GitLab would not create a pipeline."
            skip_summary "⚠️ **No build triggered** — branch \`${BRANCH}\` is not a compliant branch name, so it was not pushed for a build (GitLab would not create a pipeline for it)."
            add_summary ""
            add_summary "Push to a standard branch to trigger a build, for example:"
            add_summary ""
            add_summary "- \`main\`"
            add_summary "- \`feature/*\`"
            add_summary "- \`fix/*\`"
            add_summary "- \`chore/*\`"
            exit 0
          fi

          # 3) No .gitlab-ci.yml on the branch => no pipeline can run => nothing to build.
          CI_FILE="$(git show "refs/heads/${BRANCH}:.gitlab-ci.yml" 2>/dev/null || true)"
          if [ -z "$CI_FILE" ]; then
            echo "ℹ️ No .gitlab-ci.yml on '${BRANCH}' - not pushing; no pipeline would run."
            skip_summary "ℹ️ **No build triggered** — no \`.gitlab-ci.yml\` on branch \`${BRANCH}\`, so no pipeline can run and there is nothing to build."
            exit 0
          fi

          # 4) No new commits => the push would be a no-op and GitLab creates no
          # pipeline, so nothing would build. (Detect-and-message only for now.)
          LOCAL_SHA="$(git rev-parse "refs/heads/${BRANCH}")"
          REMOTE_SHA="$(git ls-remote gitlab "refs/heads/${BRANCH}" 2>/dev/null | awk 'NR==1{print $1}')"
          if [ -n "$REMOTE_SHA" ] && [ "$LOCAL_SHA" = "$REMOTE_SHA" ]; then
            echo "ℹ️ Branch '${BRANCH}' already up to date on GitLab (${LOCAL_SHA}); not pushing - no new pipeline would be created."
            skip_summary "ℹ️ **No build triggered** — branch \`${BRANCH}\` is already up to date on GitLab (commit \`${LOCAL_SHA:0:8}\`). There are no new commits to push, so no new pipeline was created and nothing was built by this run."
            add_summary ""
            add_summary "To build this commit, do one of the following in GitLab (**CI/CD → Pipelines**):"
            add_summary ""
            add_summary "- **Re-run** the build job in the pipeline that may already exist for this commit, or"
            add_summary "- **Create a new pipeline** for \`${BRANCH}\` and start the build job manually from the pipeline screen."
            exit 0
          fi

          # ==================================================================
          # PUSH - all pre-push checks passed: push the selected branch so its
          # pipeline is created and the build job runs automatically.
          # ==================================================================
          echo ""
          echo "Auto-build enabled - pushing branch '${BRANCH}' to trigger its build pipeline..."
          if ! push_with_retry -o ci.variable="AUTO_BUILD=true" gitlab \
               "refs/heads/${BRANCH}:refs/heads/${BRANCH}"; then
            echo "❌ ERROR: Targeted auto-build push failed after multiple attempts"
            exit 1
          fi

          # ==================================================================
          # PHASE 2 - Image URL (container-build repos only). The build is now
          # running; for container definitions we derive the ahead-of-time image
          # reference. Non-container (jar) builds simply have no image URL.
          # ==================================================================

          # Which centralized definition does this repo include? Take every
          # non-comment `file: <name>.gitlab-ci.yml`, reduce to its base <name>.
          # TODO: also handle CI/CD component includes
          #       ( - component: <host>/<path>/<name>@<ref> ) once repos adopt them.
          DEFS="$(printf '%s\n' "$CI_FILE" \
            | grep -E '^[[:space:]]*file:' \
            | grep -vE '^[[:space:]]*#' \
            | sed -E 's/.*file:[[:space:]]*//; s/["'\'']//g' \
            | sed -E 's#.*/##; s/\.gitlab-ci\.yml$//' || true)"

          CONTAINER_TYPES="quarkus-maven-native-app spring-maven-native-app"
          MATCHED=""
          for d in $DEFS; do
            for c in $CONTAINER_TYPES; do
              if [ "$d" = "$c" ]; then MATCHED="$d"; break 2; fi
            done
          done

          if [ -z "$MATCHED" ]; then
            echo "ℹ️ '${BRANCH}' uses a non-container definition (${DEFS:-none}); build triggered, no image URL."
            _ctlist=""
            for c in $CONTAINER_TYPES; do _ctlist="${_ctlist:+$_ctlist, }\`$c\`"; done
            printf -v _msg 'ℹ️ **Build triggered** — this repo uses a non-container build definition (`%s`), so there is no container image URL.' "${DEFS:-none}"
            skip_summary "$_msg"
            add_summary ""
            add_summary "Container image URLs are derived only for these container-build definitions (as of now): ${_ctlist}."
            exit 0
          fi
          echo "ℹ️ Container definition detected: ${MATCHED}"

          # pom.xml is required both to build the image and to derive its version.
          POM="$(git show "refs/heads/${BRANCH}:pom.xml" 2>/dev/null || true)"
          if [ -z "$POM" ]; then
            echo "::warning::No pom.xml on '${BRANCH}' - the container build will fail and the image URL cannot be derived."
            skip_summary "⚠️ **Build triggered, but no image URL** — no \`pom.xml\` on branch \`${BRANCH}\`. The container build will fail and the image reference cannot be derived."
            exit 0
          fi

          # project.version = first <version> after the top <artifactId>, outside
          # the <parent> block (Maven can't run here - this is a git-only runner).
          VERSION="$(printf '%s\n' "$POM" | awk '
            /<parent>/{p=1} /<\/parent>/{p=0; next}
            p{next}
            /<artifactId>/{seen=1}
            seen && match($0, /<version>[^<]+<\/version>/){
              v=substr($0,RSTART,RLENGTH); gsub(/<[^>]+>/,"",v); print v; exit
            }')"

          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-SNAPSHOT)?$'; then
            echo "::warning::Could not parse a literal semver project.version from pom.xml (got '${VERSION:-empty}'); cannot derive the image URL."
            printf -v _msg '⚠️ **Build triggered, but no image URL** — could not read a literal semver `project.version` from `pom.xml` (got `%s`). Check the pipeline for the actual image tag.' "${VERSION:-empty}"
            skip_summary "$_msg"
            exit 0
          fi

          # Image tag pattern for a branch pipeline (matches build-native-image):
          #   v<version>-<short_sha(8)>-<branch '/'->'-' cut to 20>
          SHORT_SHA="$(git rev-parse --short=8 "refs/heads/${BRANCH}")"
          BRANCH_SLUG="$(printf '%s' "$BRANCH" | tr '/' '-' | cut -c1-20)"
          IMAGE_TAG="v${VERSION}-${SHORT_SHA}-${BRANCH_SLUG}"

          # REGISTRY_IMAGE == $CI_REGISTRY_IMAGE, read authoritatively from the
          # GitLab project API (no need to guess the registry host).
          REGISTRY_IMAGE="$(curl -sS --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
            "${GITLAB_HOST}/api/v4/projects/${PROJECT_ID}" \
            | sed -n 's/.*"container_registry_image_prefix"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"

          if [ -z "$REGISTRY_IMAGE" ]; then
            echo "::warning::Could not read container_registry_image_prefix from the GitLab API; cannot derive the image URL."
            skip_summary "⚠️ **Build triggered, but no image URL** — could not read \`container_registry_image_prefix\` from the GitLab API."
            exit 0
          fi

          IMAGE_URL="${REGISTRY_IMAGE}:${IMAGE_TAG}"
          echo ""
          echo "=================================================="
          echo "📦 Container image (produced once the auto-build completes):"
          echo "   ${IMAGE_URL}"
          echo "=================================================="

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              printf '### 📦 Container image (auto-build) — `%s`\n\n' "$BRANCH"
              printf 'Ahead-of-time image reference (derived _before_ the build runs):\n\n'
              printf '```\n%s\n```\n\n' "$IMAGE_URL"

              printf '> ⚠️\n'
              printf '>\n'
              printf '> **Predicted value — not yet built.** This reference becomes valid **only after** the `build-native-image` job completes successfully and publishes the image to the GitLab Container Registry.\n'
              printf '>\n'
              printf '> Do **NOT** assume the build will succeed — wait for the build/publish job in the pipeline to finish before pulling or referencing this image.\n\n'

              printf '#### ℹ️ How this reference was computed\n\n'
              printf 'It is assembled ahead of time (before the GitLab pipeline runs) from data already known at mirror time, mirroring exactly what the `build-native-image` job will tag and push:\n\n'
              printf '| Part | Value | Source |\n'
              printf '| --- | --- | --- |\n'
              printf '| Registry | `%s` | `container_registry_image_prefix` from the GitLab project API (= `$CI_REGISTRY_IMAGE`) |\n' "$REGISTRY_IMAGE"
              printf '| Version | `%s` | `project.version` in `pom.xml` |\n' "$VERSION"
              printf '| Commit SHA | `%s` | first 8 chars of the branch-tip commit SHA |\n' "$SHORT_SHA"
              printf '| Branch slug | `%s` | branch name with slashes (`/`) replaced by hyphens (`-`), cut to 20 chars |\n' "$BRANCH_SLUG"
              printf '| **Tag** | `%s` | `v<version>-<commit-sha>-<branch-slug>` |\n\n' "$IMAGE_TAG"
              printf '**Suggested use:** pre-fill deployment manifests, release notes, or a `docker pull` command with this reference now — but keep it provisional and confirm the pipeline'\''s build/publish job is green before actually pulling or deploying it.\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # --------------------------------------------------
      # Step 9: Mirror Repository To GitLab
      # --------------------------------------------------

      - name: Mirror Repository To GitLab
        id: execute_gitlab_mirror_push
        if: ${{ steps.ensure_gitlab_project_exists.outputs.project_path != '' }}
        run: |
          set -euo pipefail
          cd repo.git

          push_with_retry() {
            for i in {1..5}; do
              echo "Attempt $i of 5..."
              if git push "$@"; then echo "✅ Push succeeded"; return 0; fi
              echo "⚠️ Attempt $i failed"
              sleep 5
            done
            return 1
          }

          # Sync COMPLIANT BRANCHES ONLY, and converge GitLab to match.
          # - Only branches whose names match the definitions' workflow: rules are
          #   pushed; non-compliant branches are never synced.
          # - GitLab branches that are non-compliant, or no longer exist on GitHub,
          #   are deleted so both sides converge.
          # - Explicit refspecs are used (never `git push --mirror`/wildcard prune):
          #   they only ever touch refs/heads/*, so local refs/remotes/gitlab/*
          #   tracking refs and GitLab-managed refs (refs/pipelines/*, ...) are left
          #   alone.
          # - Tags are intentionally NOT pushed: release tags originate on GitLab
          #   (create-release-tag) and sync GitLab -> GitHub; pushing them back would
          #   reverse that and hit protected-tag rules.
          fail() {
            echo ""
            echo "❌ ERROR: $1 failed after multiple attempts"
            echo "Possible causes:"
            echo "  - Invalid or expired GitLab token"
            echo "  - Insufficient permissions on GitLab project (or a protected ref)"
            echo "  - Network or GitLab availability issues"
            echo ""
            echo "Action Required:"
            echo "  - Verify token and permissions"
            echo "  - Retry the workflow"
            exit 1
          }

          # Local branches (this mirror clone of GitHub).
          mapfile -t LOCAL_BRANCHES < <(git for-each-ref --format='%(refname:short)' refs/heads)

          # 1) Push only compliant branches; skip (never sync) the rest.
          push_specs=()
          for br in "${LOCAL_BRANCHES[@]}"; do
            if printf '%s' "$br" | grep -qE "$COMPLIANT_BRANCH_REGEX"; then
              push_specs+=("refs/heads/${br}:refs/heads/${br}")
            else
              echo "  - skip non-compliant branch (not synced): $br"
            fi
          done

          if [ "${#push_specs[@]}" -gt 0 ]; then
            echo "Pushing ${#push_specs[@]} compliant branch(es)..."
            push_with_retry --force gitlab "${push_specs[@]}" || fail "Compliant branch push"
          else
            echo "No compliant branches to push."
          fi

          # 2) Delete GitLab branches that are non-compliant, or gone from GitHub.
          del_specs=()
          while IFS= read -r rbr; do
            [ -n "$rbr" ] || continue
            if printf '%s' "$rbr" | grep -qE "$COMPLIANT_BRANCH_REGEX" \
               && printf '%s\n' "${LOCAL_BRANCHES[@]}" | grep -qxF "$rbr"; then
              continue   # compliant and still on GitHub -> keep
            fi
            echo "  - deleting GitLab branch (non-compliant or stale): $rbr"
            del_specs+=(":refs/heads/${rbr}")
          done < <(git ls-remote --heads gitlab | sed 's#.*refs/heads/##')

          if [ "${#del_specs[@]}" -gt 0 ]; then
            echo "Deleting ${#del_specs[@]} branch(es) from GitLab..."
            push_with_retry gitlab "${del_specs[@]}" \
              || echo "::warning::One or more branches could not be deleted (they may be protected)."
          else
            echo "No branches to delete on GitLab."
          fi

          echo ""
          echo "=================================================="
          echo "✅ GitHub → GitLab Mirror Completed Successfully"
          echo "=================================================="
