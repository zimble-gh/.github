name: Add Missing Repo Metadata in Bulk

on:
  workflow_dispatch:
    inputs:
      productLine:
        required: true
        type: choice
        options:
        - common
        - ewallet
        - hyperconfigurator
        - pos-management
        - reconciliation
        - switching
      aspect:
        required: true
        type: choice
        options:
        - backend
        - frontend
        - flutter
        - platform
        - testing
        - documentation
        
      projectType:
        required: true
        type: string
      tenant:
        required: false
        type: choice
        options:
        - 7eleven
        - mercadia
        - petro
        - telcel

      dryRun:
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:

  discover_repositories:
    name: Discover And Filter Repositories
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_repository_matrix.outputs.matrix }}
      org_vars: ${{ steps.fetch_org_variables.outputs.org_vars }}

    steps:

      - name: Generate GitHub App Token
        id: generate_github_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID || vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Fetch Organization Variables
        id: fetch_org_variables
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.generate_github_app_token.outputs.token }}
          script: |
            try {
              const org = context.repo.owner;

              const response = await github.request(
                "GET /orgs/{org}/actions/variables",
                { org }
              );

              const variables = response.data.variables || [];
              core.info(`ℹ️ Org variables fetched: ${variables.length}`);

              core.setOutput("org_vars", JSON.stringify(variables));

            } catch (err) {
              core.setFailed(`❌ Failed to fetch org variables: ${err.message}`);
            }

      - name: Build Repository Matrix
        id: build_repository_matrix
        uses: actions/github-script@v9
        env:
          PRODUCT_LINE: ${{ inputs.productLine }}
          ASPECT: ${{ inputs.aspect }}
          TENANT: ${{ inputs.tenant }}
        with:
          github-token: ${{ steps.generate_github_app_token.outputs.token }}
          script: |

            const org = context.repo.owner;
            const productLine = process.env.PRODUCT_LINE;
            const aspect = process.env.ASPECT;
            const tenant = process.env.TENANT;

            const repos = await github.paginate(
              github.rest.repos.listForOrg,
              { org, per_page: 100, sort: "full_name", direction: "asc", type: "all" }
            );

            const filtered = [];

            for (const repo of repos) {
              try {

                if (repo.name === ".github" || repo.full_name.endsWith("/.github")) {
                  core.info(`ℹ️ Skipping special repo: ${repo.full_name}`);
                  continue;
                }
                if (repo.fork || repo.archived || repo.disabled) {
                  core.info(`ℹ️ Skipping repo: ${repo.full_name} (fork: ${repo.fork}, archived: ${repo.archived}, disabled: ${repo.disabled})`);
                  continue;
                }

                if (!repo.name.startsWith(`${productLine}-`)) continue;

                let remaining = repo.name.substring(productLine.length + 1);

                if (!remaining.startsWith(`${aspect}-`)) continue;

                remaining = remaining.substring(aspect.length + 1);

                if (tenant && !remaining.endsWith(`-${tenant}`)) continue;

                let repoBase = remaining;
                if (tenant) {
                  repoBase = remaining.slice(0, -(tenant.length + 1));
                }

                filtered.push({
                  repo: repo.name,
                  repoBase,
                  private: repo.private
                });

              } catch (err) {
                core.warning(`⚠️ Error processing repo ${repo.name}: ${err.message}`);
              }
            }

            const batchSize = 5;
            const matrix = [];

            for (let i = 0; i < filtered.length; i += batchSize) {
              matrix.push(filtered.slice(i, i + batchSize));
            }

            core.setOutput("matrix", JSON.stringify(matrix));
            core.info(`ℹ️ Total repos matched: ${filtered.length}`);
            core.info(`ℹ️ Total batches: ${matrix.length}`);

            
  dry_run_preview:
    name: Dry Run Preview Of Repository Updates
    needs: discover_repositories
    if: inputs.dryRun == true
    runs-on: ubuntu-latest

    steps:

      - name: Display Dry Run Summary
        id: display_dry_run_summary
        uses: actions/github-script@v9
        env:
          PRODUCT_LINE: ${{ inputs.productLine }}
          ASPECT: ${{ inputs.aspect }}
          PROJECT_TYPE: ${{ inputs.projectType }}
          TENANT: ${{ inputs.tenant }}
          MATRIX: ${{ needs.discover_repositories.outputs.matrix }}
          ORG_VARS: ${{ needs.discover_repositories.outputs.org_vars }}
        with:
          script: |

            const matrix = JSON.parse(process.env.MATRIX);
            const repos = matrix.flat();
            const tenant = process.env.TENANT;

            const topics = [
              `product-${process.env.PRODUCT_LINE}`,
              `aspect-${process.env.ASPECT}`,
              `type-${process.env.PROJECT_TYPE}`,
              `managed-by-platform`
            ];
            if (tenant) topics.push(`tenant-${tenant}`);

            core.info("\n📌 Topics:");
            topics.forEach(t => core.info(`  - ${t}`));

            core.info("\n📌 Common Repo Variables:");
            core.info(`REPO_METADATA_PRODUCT_LINE = ${process.env.PRODUCT_LINE}`);
            core.info(`REPO_METADATA_ASPECT       = ${process.env.ASPECT}`);
            core.info(`REPO_METADATA_MANAGED      = true`);
            core.info(`REPO_METADATA_TYPE         = quarkus-maven-native-app`);
            if (tenant) core.info(`REPO_METADATA_TENANT       = ${tenant}`);

            const orgVars = JSON.parse(process.env.ORG_VARS || "[]");

            core.info("\n📌 Org Variables:");
            orgVars.forEach(v => core.info(`  ${v.name}`));

            core.info("\n📌 Secrets (Masked):");
            core.info("  GITLAB_API_TOKEN = ********");
            core.info("  GH_APP_PRIVATE_KEY = ********");

            for (const repo of repos) {
              core.info(`\n🔍 ${repo.repo}`);
              core.info(`  REPO_METADATA_NAME = ${repo.repoBase}`);
            }

            core.info(`\n✅ Dry run complete. Total repos: ${repos.length}`); 
            
  process_repositories:
    name: Process Repository Metadata In Batches
    needs: discover_repositories
    if: inputs.dryRun == false
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.discover_repositories.outputs.matrix) }}

    steps:

      - name: Generate GitHub App Token
        id: generate_github_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID || vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Ensure GH CLI Installed
        id: ensure_gh_cli
        run: |
          set -e

          if command -v gh >/dev/null 2>&1; then
            echo "gh already installed"
            gh --version
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ gh not found. Installing..."

            if sudo apt-get update && sudo apt-get install -y gh; then
              echo "gh installed successfully"
              gh --version
              echo "installed=true" >> $GITHUB_OUTPUT
            else
              echo "❌ Failed to install gh CLI"
              echo "installed=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

      - name: Apply Topics
        id: apply_topics
        uses: actions/github-script@v9
        env:
          ORG: ${{ github.repository_owner }}
          PRODUCT_LINE: ${{ inputs.productLine }}
          ASPECT: ${{ inputs.aspect }}
          PROJECT_TYPE: ${{ inputs.projectType }}
          TENANT: ${{ inputs.tenant }}
        with:
          github-token: ${{ steps.generate_github_app_token.outputs.token }}
          script: |

            const batch = ${{ toJson(matrix.batch) }};
            const tenant = process.env.TENANT;

            const topics = [
              `product-${process.env.PRODUCT_LINE}`,
              `aspect-${process.env.ASPECT}`,
              `type-${process.env.PROJECT_TYPE}`,
              `managed-by-platform`
            ];
            if (tenant) topics.push(`tenant-${tenant}`);

            for (const item of batch) {
              try {

                await github.rest.repos.replaceAllTopics({
                  owner: process.env.ORG,
                  repo: item.repo,
                  names: topics
                });

                core.info(`✅ Topics applied: ${item.repo}`);

              } catch (err) {
                core.error(`❌ Topic failed: ${item.repo} -> ${err.message}`);
              }
            }

      - name: Upsert Repository Metadata Variables
        id: upsert_repo_metadata
        uses: actions/github-script@v9
        env:
          ORG: ${{ github.repository_owner }}
          PRODUCT_LINE: ${{ inputs.productLine }}
          ASPECT: ${{ inputs.aspect }}
          PROJECT_TYPE: ${{ inputs.projectType }}
          TENANT: ${{ inputs.tenant }}
        with:
          github-token: ${{ steps.generate_github_app_token.outputs.token }}
          script: |

            const batch = ${{ toJson(matrix.batch) }};
            const tenant = process.env.TENANT;

            for (const item of batch) {

              const repo = item.repo;

              try {
                core.info(`\nℹ️ Processing metadata for ${repo}`);

                // ---------------------------------------
                // STEP 1: FETCH EXISTING VARIABLES
                // ---------------------------------------
                let existingVars = {};

                try {
                  const response = await github.request(
                    "GET /repos/{owner}/{repo}/actions/variables",
                    {
                      owner: process.env.ORG,
                      repo: repo
                    }
                  );

                  for (const v of response.data.variables) {
                    existingVars[v.name] = v.value;
                  }

                  core.info(`ℹ️ Existing variables fetched: ${Object.keys(existingVars).length}`);

                } catch (err) {
                  core.warning(`⚠️ Failed to fetch variables for ${repo}: ${err.message}`);
                  continue; // Skip to next repo if we can't fetch variables
                }

                // ---------------------------------------
                // STEP 2: PREPARE TARGET VARIABLES
                // ---------------------------------------
                const targetVars = {
                  REPO_METADATA_PRODUCT_LINE: process.env.PRODUCT_LINE,
                  REPO_METADATA_ASPECT: process.env.ASPECT,
                  REPO_METADATA_NAME: item.repoBase,
                  REPO_METADATA_MANAGED: "true",
                  REPO_METADATA_TYPE: process.env.PROJECT_TYPE
                };

                if (tenant) {
                  targetVars.REPO_METADATA_TENANT = tenant;
                }

                // ---------------------------------------
                // STEP 3: UPSERT LOGIC
                // ---------------------------------------
                for (const [key, value] of Object.entries(targetVars)) {

                  try {

                    if (!(key in existingVars)) {
                      // -------------------------
                      // CREATE (POST)
                      // -------------------------
                      await github.request(
                        "POST /repos/{owner}/{repo}/actions/variables",
                        {
                          owner: process.env.ORG,
                          repo: repo,
                          name: key,
                          value: value
                        }
                      );

                      core.info(`🆕 Created variable: ${key}`);

                    } else if (existingVars[key] !== value) {
                      // -------------------------
                      // UPDATE (PUT)
                      // -------------------------
                      await github.request(
                        "PATCH /repos/{owner}/{repo}/actions/variables/{name}",
                        {
                          owner: process.env.ORG,
                          repo: repo,
                          name: key,
                          value: value
                        }
                      );

                      core.info(`🔄 Updated variable: ${key}`);

                    } else {
                      // -------------------------
                      // NO CHANGE
                      // -------------------------
                      core.info(`⏭️ No change: ${key}`);
                    }

                  } catch (err) {
                    core.warning(`⚠️ Variable ${key} failed for ${repo}: ${err.message}`);
                  }
                }

                core.info(`✅ Metadata upsert completed: ${repo}`);

              } catch (err) {
                core.error(`❌ Metadata processing failed for ${repo}: ${err.message}`);
              }
            }

      - name: Sync Organization Variables To Private Repos
        id: sync_org_variables
        uses: actions/github-script@v9
        env:
          ORG: ${{ github.repository_owner }}
          ORG_VARS: ${{ needs.discover_repositories.outputs.org_vars }}
        with:
          github-token: ${{ steps.generate_github_app_token.outputs.token }}
          script: |

            const batch = ${{ toJson(matrix.batch) }};
            const orgVars = JSON.parse(process.env.ORG_VARS || "[]");

            for (const item of batch) {

              const repo = item.repo;

              if (!item.private) {
                core.info(`ℹ️ Skipping public repo: ${repo}`);
                continue;
              }

              try {
                core.info(`\nℹ️ Syncing org variables for ${repo}`);

                // ---------------------------------------
                // STEP 1: FETCH EXISTING REPO VARIABLES
                // ---------------------------------------
                let existingVars = {};

                try {
                  const response = await github.request(
                    "GET /repos/{owner}/{repo}/actions/variables",
                    {
                      owner: process.env.ORG,
                      repo: repo
                    }
                  );

                  for (const v of response.data.variables) {
                    existingVars[v.name] = v.value;
                  }

                  core.info(`ℹ️ Existing repo vars: ${Object.keys(existingVars).length}`);

                } catch (err) {
                  core.warning(`⚠️ Failed fetching repo vars for ${repo}: ${err.message}`);
                  continue; // cannot safely proceed
                }

                // ---------------------------------------
                // STEP 2: UPSERT ORG VARIABLES
                // ---------------------------------------
                for (const v of orgVars) {

                  const key = v.name;
                  const value = v.value;

                  try {

                    if (!(key in existingVars)) {
                      // -------------------------
                      // CREATE
                      // -------------------------
                      await github.request(
                        "POST /repos/{owner}/{repo}/actions/variables",
                        {
                          owner: process.env.ORG,
                          repo: repo,
                          name: key,
                          value: value
                        }
                      );

                      core.info(`🆕 Created: ${key}`);

                    } else if (existingVars[key] !== value) {
                      // -------------------------
                      // UPDATE
                      // -------------------------
                      await github.request(
                        "PATCH /repos/{owner}/{repo}/actions/variables/{name}",
                        {
                          owner: process.env.ORG,
                          repo: repo,
                          name: key,
                          value: value
                        }
                      );

                      core.info(`🔄 Updated: ${key}`);

                    } else {
                      // -------------------------
                      // NO CHANGE
                      // -------------------------
                      core.info(`⏭️ No change: ${key}`);
                    }

                  } catch (err) {
                    core.warning(`⚠️ Failed ${key} for ${repo}: ${err.message}`);
                  }
                }

                core.info(`✅ Org variables synced successfully: ${repo}`);

              } catch (err) {
                core.error(`❌ Org variable sync failed for ${repo}: ${err.message}`);
              }
            }

      - name: Sync Repository Secrets
        id: sync_repo_secrets
        if: steps.ensure_gh_cli.outputs.installed == 'true'
        uses: actions/github-script@v9
        env:
          ORG: ${{ github.repository_owner }}
          GH_TOKEN: ${{ steps.generate_github_app_token.outputs.token }}
          GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}
        with:
          github-token: ${{ steps.generate_github_app_token.outputs.token }}
          script: |

            const { execSync } = require('child_process');
            const batch = ${{ toJson(matrix.batch) }};

            for (const item of batch) {

              if (!item.private){
                core.info(`ℹ️ Skipping secret sync for public repo: ${item.repo}`);
                continue;
              };

              try {

                execSync(`echo "${process.env.GITLAB_API_TOKEN}" | gh secret set GITLAB_API_TOKEN --repo ${process.env.ORG}/${item.repo}`);
                execSync(`echo "${process.env.GH_APP_PRIVATE_KEY}" | gh secret set GH_APP_PRIVATE_KEY --repo ${process.env.ORG}/${item.repo}`);

                core.info(`✅ Secrets synced for: ${item.repo}`);

              } catch (err) {
                core.error(`❌ Secret sync failed for: ${item.repo} -> ${err.message}`);
              }
            }
