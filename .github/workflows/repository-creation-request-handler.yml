name: Repository Creation Processor

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write
  administration: write

jobs:

  parse_and_validate:
    if: >
      contains(github.event.issue.labels.*.name, 'repo-creation-request') &&
      startsWith(github.event.issue.title, '[REPO-CREATION-REQUEST]')
    runs-on: ubuntu-latest
    outputs:
      repo_name: ${{ steps.parse.outputs.repo_name }}
      visibility: ${{ steps.parse.outputs.visibility }}
      description: ${{ steps.parse.outputs.description }}
      parse_status: ${{ steps.parse.outputs.status }}

    steps:
      - name: Parse Issue
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const body = context.payload.issue.body;

            function extract(label) {
              const regex = new RegExp(`### ${label}\\s+([\\s\\S]*?)(?=\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : null;
            }

            try {
              const product = extract("Product Line");
              const aspect = extract("Aspect / Domain");
              const name = extract("Repository Name");
              const tenant = extract("Tenant Name \\(Optional\\)");
              const description = extract("Repository Description");
              const visibilityRaw = extract("Repository Visibility");

              if (!product || !aspect || !name || !description || !visibilityRaw) {
                core.setOutput("status", "PARSE_ERROR");
                core.setFailed("Missing required fields.");
                return;
              }

              if (!/^[a-z0-9-]+$/.test(name)) {
                core.setOutput("status", "PARSE_ERROR");
                core.setFailed("Repository name must be kebab-case.");
                return;
              }

              const finalName = tenant
                ? `${product}-${aspect}-${name}-${tenant}`
                : `${product}-${aspect}-${name}`;

              const visibility = visibilityRaw.includes("Private")
                ? "private"
                : "internal";

              core.setOutput("repo_name", finalName);
              core.setOutput("visibility", visibility);
              core.setOutput("description", description);
              core.setOutput("status", "OK");

            } catch (err) {
              core.setOutput("status", "PARSE_ERROR");
              core.setFailed(err.message);
            }

  check_duplicate:
    needs: parse_and_validate
    if: needs.parse_and_validate.outputs.parse_status == 'OK'
    runs-on: ubuntu-latest
    outputs:
      duplicate_status: ${{ steps.check.outputs.status }}

    steps:
      - name: Check Repo Exists
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.get({
                owner: context.repo.owner,
                repo: "${{ needs.parse_and_validate.outputs.repo_name }}"
              });
              core.setOutput("status", "DUPLICATE");
            } catch {
              core.setOutput("status", "NOT_FOUND");
            }

  create_repository:
    needs: check_duplicate
    if: needs.check_duplicate.outputs.duplicate_status == 'NOT_FOUND'
    runs-on: ubuntu-latest
    outputs:
      creation_status: ${{ steps.create.outputs.status }}

    steps:
      - name: Create Repo
        id: create
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            try {
              const repo = await github.rest.repos.createInOrg({
                org: context.repo.owner,
                name: "${{ needs.parse_and_validate.outputs.repo_name }}",
                description: "${{ needs.parse_and_validate.outputs.description }}",
                visibility: "${{ needs.parse_and_validate.outputs.visibility }}",
                auto_init: true
              });

              core.setOutput("status", "CREATED");
              core.setOutput("url", repo.data.html_url);
            } catch (err) {
              core.setOutput("status", "CREATION_ERROR");
              core.setFailed(err.message);
            }

  success_handler:
    needs: create_repository
    if: needs.create_repository.outputs.creation_status == 'CREATED'
    runs-on: ubuntu-latest
    steps:
      - name: Comment & Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ needs.create_repository.outputs.url }}";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Repository created successfully: ${url}`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });

  handle_duplicate:
    needs: check_duplicate
    if: needs.check_duplicate.outputs.duplicate_status == 'DUPLICATE'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "❌ Repository already exists."
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });

  handle_parse_error:
    needs: parse_and_validate
    if: failure() && needs.parse_and_validate.outputs.parse_status == 'PARSE_ERROR'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "❌ Issue parsing/validation failed. Please correct and edit the issue."
            });

  notify_user:
    needs: success_handler
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Repository Created
          body: Repository has been successfully created.
          to: ${{ github.event.issue.user.email }}
          from: Platform Team