name: Sync Secrets & Variables Across Private Repos

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "bulk = all private repos, selective = chosen repos"
        required: true
        default: "selective"
        type: choice
        options:
          - bulk
          - selective

      target_repos:
        description: "Comma-separated repo names (only for selective mode)"
        required: false

      dry_run:
        description: "Dry run mode (no changes applied)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------
      # 🔐 GitHub App Token
      # -------------------------------------------------
      - name: Generate GitHub App Token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.GH_APP_ID || vars.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}

      # -------------------------------------------------
      # 📡 Compute target repos (private only + validation)
      # -------------------------------------------------
      - name: Compute target repos
        id: repos
        uses: actions/github-script@v9
        env:
          MODE: ${{ inputs.mode }}
          TARGET_REPOS: ${{ inputs.target_repos }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const org = context.repo.owner;
            const mode = process.env.MODE;
            const targetReposInput = process.env.TARGET_REPOS;

            core.info(`Mode: ${mode}`);

            // ✅ Validation added
            if (mode === "selective" && (!targetReposInput || targetReposInput.trim() === "")) {
              core.setFailed("target_repos must be provided in selective mode");
              return;
            }

            let repos = [];

            if (mode === "bulk") {
              core.info("Fetching all private repos...");

              const allRepos = await github.paginate(
                github.rest.repos.listForOrg,
                { org, per_page: 100 }
              );

              repos = allRepos.filter(r => r.private).map(r => r.name);

            } else {
              core.info("Using comma-separated repo list...");

              const inputRepos = targetReposInput.split(",").map(r => r.trim());

              if (inputRepos.length === 0) {
                core.setFailed("No valid repositories resolved");
                return;
              }

              for (const repo of inputRepos) {
                try {
                  const { data } = await github.rest.repos.get({ owner: org, repo });

                  if (data.private) {
                    repos.push(repo);
                  } else {
                    core.warning(`Skipping non-private repo: ${repo}`);
                  }

                } catch {
                  core.warning(`Repo not accessible: ${repo}`);
                }
              }
            }

            core.info(`Target repos: ${repos.join(", ")}`);

            if (repos.length === 0) {
              core.warning("No repositories to process.");
              return;
            }

            core.setOutput("repos", JSON.stringify(repos));

      # -------------------------------------------------
      # 📦 Fetch repo variables
      # -------------------------------------------------
      - name: Fetch repo variables
        id: vars
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const org = context.repo.owner;
            const repo = context.repo.repo;

            const varsList = await github.paginate(
              github.rest.actions.listRepoVariables,
              { owner: org, repo, per_page: 100 }
            );

            const vars = {};
            for (const v of varsList) {
              vars[v.name] = v.value;
            }

            core.info(`Variables found: ${Object.keys(vars).join(", ")}`);
            core.setOutput("vars", JSON.stringify(vars));

      # -------------------------------------------------
      # 🔐 Sync secrets (gh CLI)
      # -------------------------------------------------
      - name: Sync secrets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          REPOS: ${{ steps.repos.outputs.repos }}
          DRY_RUN: ${{ inputs.dry_run }}

          GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN || vars.GITLAB_API_TOKEN }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY || vars.GH_APP_PRIVATE_KEY }}

        run: |
          echo "$REPOS" | jq -r '.[]' | xargs -I{} -P5 bash -c '
            REPO="{}"
            echo "Processing secrets for $REPO"

            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY-RUN] Would sync secrets to $REPO"
              exit 0
            fi

            {
              echo "$GITLAB_API_TOKEN" | gh secret set GITLAB_API_TOKEN --repo "$ORG/$REPO"
              echo "$GH_APP_PRIVATE_KEY" | gh secret set GH_APP_PRIVATE_KEY --repo "$ORG/$REPO"
              echo "Secrets synced for $REPO"
            } || {
              echo "❌ Failed secrets for $REPO"
            }
          '

      # -------------------------------------------------
      # 📦 Sync variables
      # -------------------------------------------------
      - name: Sync variables
        uses: actions/github-script@v9
        env:
          REPOS: ${{ steps.repos.outputs.repos }}
          VARS: ${{ steps.vars.outputs.vars }}
          DRY_RUN: ${{ inputs.dry_run }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const org = context.repo.owner;
            const repos = JSON.parse(process.env.REPOS || "[]");
            const variables = JSON.parse(process.env.VARS || "{}");
            const dryRun = process.env.DRY_RUN === "true";

            const BATCH_SIZE = 5;

            async function processRepo(repo) {
              try {
                core.info(`Processing variables for ${repo}`);

                if (dryRun) {
                  core.info(`[DRY-RUN] Would sync variables to ${repo}`);
                  return { repo, status: "dry-run" };
                }

                for (const [name, value] of Object.entries(variables)) {
                  try {
                    await github.rest.actions.updateRepoVariable({
                      owner: org,
                      repo,
                      name,
                      value
                    });
                  } catch (err) {
                    if (err.status === 404) {
                      await github.rest.actions.createRepoVariable({
                        owner: org,
                        repo,
                        name,
                        value
                      });
                    } else {
                      throw err;
                    }
                  }
                }

                return { repo, status: "success" };

              } catch (err) {
                core.error(`Failed variables for ${repo}: ${err.message}`);
                return { repo, status: "failed" };
              }
            }

            async function processInBatches(items, size) {
              const results = [];

              for (let i = 0; i < items.length; i += size) {
                const batch = items.slice(i, i + size);

                const res = await Promise.allSettled(
                  batch.map(r => processRepo(r))
                );

                res.forEach(r => {
                  if (r.status === "fulfilled") results.push(r.value);
                  else results.push({ status: "failed" });
                });
              }

              return results;
            }

            const results = await processInBatches(repos, BATCH_SIZE);

            const success = results.filter(r => r.status === "success").length;
            const failed = results.filter(r => r.status === "failed").length;
            const skipped = results.filter(r => r.status === "dry-run").length;

            core.info("=================================");
            core.info(`Variables Sync Summary`);
            core.info(`Success: ${success}`);
            core.info(`Failed: ${failed}`);
            core.info(`Dry-run: ${skipped}`);
            core.info("=================================");
