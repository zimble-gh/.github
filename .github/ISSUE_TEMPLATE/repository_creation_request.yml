name: 🏗 Repository Creation Request
description: Request creation of a new repository under the organization
title: "[REPO-CREATION-REQUEST] "
labels: ["repo-creation-request", "platform-triage"]
type: task

body:
  - type: markdown
    attributes:
      value: |
        ## 📦 Repository Creation Request

        Please complete all required fields. 
        The platform team will review and provision the repository.

  - type: dropdown
    id: product_line
    attributes:
      label: Product Line
      description: Select the product line this repository belongs to
      options:
        - common
        - ewallet
        - hyperconfigurator
        - pos-management
        - reconciliation
        - switching
    validations:
      required: true

  - type: dropdown
    id: aspect
    attributes:
      label: Aspect / Domain
      description: Select the primary aspect of this repository
      options:
        - backend
        - frontend
        - flutter
        - platform
        - testing
        - documentation
    validations:
      required: true

  - type: dropdown
    id: project_type
    attributes:
      label: Project Type
      description: Select the project/template type for this repository ( DO NOT select category markers )
      options:
        - ------------------------                       
        - --- Backend ---
        - java-maven-library
        - quarkus-maven-extension
        - quarkus-maven-jdk-app
        - quarkus-maven-native-app
        - spring-maven-jdk-app
        - spring-maven-native-app

        - --- Flutter ---
        - flutter-android-app
        - flutter-ios-app
        - flutter-webapp
        - flutter-windows-app

        - --- Frontend ---
        - nextjs-webapp

        - --- Platform ---
        - cicd-util-scripts
        - gitops
        - helm-charts
        - local-util-scripts
        - python-pyproject
        - python-scripts
        - terraform-modules
        - terraform-scripts

        - --- Testing ---
        - appium-java-scripts
        - appium-js-scripts
        - appium-py-scripts
        - playwright-scripts

        - --- Documentation ---
        - doc
    validations:
      required: true

  - type: input
    id: repository_name
    attributes:
      label: Repository Name
      description: Enter the desired repository name (kebab-case recommended)
      placeholder: my-awesome-service
    validations:
      required: true

  - type: dropdown
    id: tenant_name
    attributes:
      label: Tenant Name (Optional)
      description: Select tenant (choose "None" if not applicable)
      options:
        - 7-eleven
        - mercadia
        - petro
        - telcel
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Repository Description (Max. 350 characters)
      description: Provide a short description of the repository purpose
      placeholder: This repository will host my awesome microservice.
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Business / Technical Justification
      description: Explain why a new repository is required
      placeholder: Separate repo required due to independent deployment lifecycle.
    validations:
      required: true

  - type: checkboxes
    id: compliance
    attributes:
      label: Compliance Checklist
      options:
        - label: Naming convention reviewed
          required: true
        - label: Repository ownership team identified
          required: true
        - label: Security review required
        - label: Infra provisioning required

  - type: checkboxes
    id: repository_options
    attributes:
      label: Repository Options (Optional)
      description: Select additional repository options
      options:
        - label: Initialize repository with README (Do NOT select in case you have already created the project locally with content)

  - type: dropdown
    id: visibility
    attributes:
      label: Repository Visibility
      description: Select visibility level
      options:
        - Private
        - Public
        - Internal (Enterprise only)
    validations:
      required: true
